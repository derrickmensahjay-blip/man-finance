// SETTINGS PAGE
// =============================================
function pageSettings() {
  return `
    <div class="page-header"><h2>⚙ System Settings</h2><p>Configure rates and system preferences</p></div>
    <div class="card">
      <div class="card-title">Financial Rates</div>
      <div class="form-grid">
        <div class="form-group"><label>Tithe Rate (%)</label><input type="number" id="s-tithe" placeholder="10" min="1" max="100"></div>
        <div class="form-group"><label>Savings Rate (% of post-tithe)</label><input type="number" id="s-savings" placeholder="60" min="1" max="100"></div>
        <div class="form-group"><label>Operational Rate (% of post-tithe)</label><input type="number" id="s-op" placeholder="40" min="1" max="100" readonly style="background:#f5f5f5;"></div>
        <div class="form-group"><label>Welfare Offering Frequency</label><select id="s-welfare">
          <option value="weekly">Weekly</option>
          <option value="biweekly">Every Two Weeks</option>
          <option value="monthly">Monthly</option>
        </select></div>
        <div class="form-group"><label>Church Name</label><input type="text" id="s-church" placeholder="Church name"></div>
      </div>
      <hr class="divider">
      <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px;">🏦 Church Account Details (shown during reconciliation)</div>
      <div class="form-grid">
        <div class="form-group"><label>Account Name</label><input type="text" id="s-account-name" placeholder="e.g. Mighty Army Network"></div>
        <div class="form-group"><label>Mobile Money Number</label><input type="text" id="s-momo" placeholder="e.g. 024XXXXXXX"></div>
        <div class="form-group full"><label>Bank Account Number & Bank Name</label><input type="text" id="s-bank" placeholder="e.g. 1234567890 — GCB Bank"></div>
      </div>
      <div class="alert alert-info mt-16">Note: Savings + Operational rates must add up to 100%. Changing rates only affects future recordings.</div>
      <div class="btn-group mt-16">
        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      </div>
      <div id="settings-msg" class="mt-8"></div>
    </div>
    <div id="danger-zone-container"></div>
  `;
}

async function loadSettings() {
  const s = appData.settings;
  const setVal = (id, val) => { const el = document.getElementById(id); if(el && val) el.value = val; };
  setVal('s-tithe', s.tithe_rate);
  setVal('s-savings', s.savings_rate);
  setVal('s-op', s.operational_rate);
  setVal('s-welfare', s.welfare_frequency);
  setVal('s-church', s.church_name);
  setVal('s-account-name', s.church_account_name);
  setVal('s-momo', s.church_momo);
  setVal('s-bank', s.church_bank);
  document.getElementById('s-savings')?.addEventListener('input', function() {
    const op = document.getElementById('s-op');
    if(op) op.value = Math.max(0, 100 - parseFloat(this.value||0));
  });
  // Render danger zone only for lead pastor
  const dz = document.getElementById('danger-zone-container');
  if (dz) {
    dz.innerHTML = currentUser.role === 'lead_pastor' ? `
      <div class="card" style="border:2px solid var(--red);margin-top:20px;">
        <div class="card-title" style="color:var(--red);">⚠ Danger Zone — Clear Test Data</div>
        <div class="alert alert-error">This will permanently delete ALL income records, fund requests, welfare disbursements, savings withdrawals, pledges, campaigns and reset all fund pot balances to zero. Users and settings are kept. This cannot be undone.</div>
        <div class="btn-group mt-16">
          <button class="btn btn-danger" onclick="clearAllTestData()">🗑 Clear All Data & Reset Balances</button>
        </div>
        <div id="clear-msg" class="mt-8"></div>
      </div>` : '';
  }
}

async function saveSettings() {
  const tithe = document.getElementById('s-tithe').value;
  const savings = document.getElementById('s-savings').value;
  const op = 100 - parseFloat(savings||60);
  const welfare = document.getElementById('s-welfare').value;
  const church = document.getElementById('s-church').value.trim();
  const accountName = document.getElementById('s-account-name').value.trim();
  const momo = document.getElementById('s-momo').value.trim();
  const bank = document.getElementById('s-bank').value.trim();
  const msg = document.getElementById('settings-msg');
  const updates = [
    { key:'tithe_rate', value: tithe },
    { key:'savings_rate', value: savings },
    { key:'operational_rate', value: op.toString() },
    { key:'welfare_frequency', value: welfare },
    { key:'church_name', value: church },
    { key:'church_account_name', value: accountName },
    { key:'church_momo', value: momo },
    { key:'church_bank', value: bank }
  ];
  for (const u of updates) {
    await db.from('settings').upsert({ key: u.key, value: u.value, updated_at: new Date().toISOString() });
  }
  await loadGlobalData();
  msg.innerHTML = '<div class="alert alert-success">✓ Settings saved</div>';
  loadSettings();
}

async function clearAllTestData() {
  if (!confirm('Are you sure? This will DELETE ALL financial data and reset all balances to zero. This cannot be undone.')) return;
  if (!confirm('Final confirmation — delete everything and reset balances?')) return;
  const msg = document.getElementById('clear-msg');
  if (msg) msg.innerHTML = '<div class="alert alert-info">Clearing data...</div>';
  try {
    await Promise.all([
      db.from('pledge_payments').delete().neq('id', '00000000-0000-0000-0000-000000000000'),
      db.from('pledges').delete().neq('id', '00000000-0000-0000-0000-000000000000'),
      db.from('campaigns').delete().neq('id', '00000000-0000-0000-0000-000000000000'),
      db.from('welfare_disbursements').delete().neq('id', '00000000-0000-0000-0000-000000000000'),
      db.from('savings_withdrawals').delete().neq('id', '00000000-0000-0000-0000-000000000000'),
      db.from('fund_requests').delete().neq('id', '00000000-0000-0000-0000-000000000000'),
      db.from('income_records').delete().neq('id', '00000000-0000-0000-0000-000000000000'),
      db.from('audit_log').delete().neq('id', '00000000-0000-0000-0000-000000000000'),
    ]);
    // Reset all pot balances to zero
    const pots = ['tithe','savings','operational','womens_ministry','welfare'];
    await Promise.all(pots.map(p => db.from('fund_pots').update({ balance: 0, updated_at: new Date().toISOString() }).eq('name', p)));
    await loadGlobalData();
    if (msg) msg.innerHTML = '<div class="alert alert-success">✓ All test data cleared and balances reset to zero.</div>';
  } catch(e) {
    if (msg) msg.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
  }
}
