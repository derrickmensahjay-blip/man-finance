<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAN Finance System</title>
<meta name="description" content="Mighty Army Network Finance & Administration System">
<meta name="theme-color" content="#0a2e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAN Finance">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* NOTIFICATION BELL */
  .notif-bell { position: relative; cursor: pointer; padding: 4px 8px; color: rgba(255,255,255,0.8); font-size: 18px; border-radius: 6px; display:inline-block; }
  .notif-bell:hover { color: white; background: rgba(255,255,255,0.1); }
  .notif-badge { position: absolute; top: 0px; right: 2px; background: var(--red); color: white; border-radius: 50%; width: 15px; height: 15px; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .notif-dropdown { position: fixed; left: 10px; top: 60px; width: 300px; background: white; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.25); z-index: 9999; overflow: hidden; max-height: 400px; overflow-y: auto; border: 1px solid #e0e0e0; }
  .notif-header { padding: 12px 16px; background: var(--green); color: white; font-size: 13px; font-weight: 700; position: sticky; top: 0; }
  .notif-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 12px; cursor: pointer; }
  .notif-item:hover { background: #f9f9f9; }
  .notif-item.unread { background: #f0f9f4; border-left: 3px solid var(--green); }
  .notif-item .notif-title { font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .notif-item .notif-time { color: var(--muted); font-size: 11px; }
  .notif-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }
</style>
<style>
  :root {
    --gold: #b8860b;
    --gold-light: #f5e6c0;
    --gold-dark: #7a5c00;
    --green: #1a5c2e;
    --green-light: #e8f5ed;
    --green-mid: #2e7d4f;
    --red: #c0392b;
    --red-light: #fdecea;
    --blue: #1565c0;
    --blue-light: #e3f2fd;
    --gray: #f4f4f4;
    --border: #ddd;
    --text: #1a1a1a;
    --muted: #666;
    --white: #ffffff;
    --sidebar-w: 240px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: var(--text); font-size: 14px; }

  /* AUTH */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a2e1a 0%, #1a5c2e 60%, #b8860b 100%);
  }
  .auth-card {
    background: white; border-radius: 16px; padding: 40px 36px; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .auth-logo { text-align: center; margin-bottom: 28px; }
  .auth-logo .cross { font-size: 36px; color: var(--gold); }
  .auth-logo h1 { font-size: 20px; font-weight: 700; color: var(--green); margin-top: 6px; }
  .auth-logo p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .auth-card label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .auth-card input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border 0.2s; }
  .auth-card input:focus { border-color: var(--green); }
  .btn-login { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-login:hover { background: var(--green-mid); }
  .auth-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 10px; display: none; }

  /* LAYOUT */
  #app { display: none; min-height: 100vh; }
  .sidebar {
    position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
    background: #0a2e1a; color: white; overflow-y: auto; z-index: 100;
    display: flex; flex-direction: column;
  }
  .sidebar-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-header .church-name { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
  .sidebar-header .system-name { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .sidebar-user { padding: 14px 16px; background: rgba(255,255,255,0.05); margin: 8px 10px; border-radius: 8px; }
  .sidebar-user .u-name { font-size: 13px; font-weight: 600; color: white; }
  .sidebar-user .u-role { font-size: 11px; color: var(--gold-light); margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 8px 0; }
  .nav-section { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; padding: 12px 16px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.15s;
    font-size: 13px; border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
  .nav-item.active { background: rgba(184,134,11,0.2); color: var(--gold-light); border-left-color: var(--gold); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.1); }
  .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .btn-logout:hover { background: rgba(192,57,43,0.3); color: white; }

  /* MAIN CONTENT */
  .main { margin-left: var(--sidebar-w); padding: 24px; min-height: 100vh; }
  .page { display: none; }
  .page.active { display: block; }
  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-size: 22px; font-weight: 700; color: var(--green); }
  .page-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* CARDS */
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 20px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: white; border-radius: 12px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-top: 3px solid var(--green); }
  .stat-card.gold { border-top-color: var(--gold); }
  .stat-card.red { border-top-color: var(--red); }
  .stat-card.blue { border-top-color: var(--blue); }
  .stat-card.purple { border-top-color: #7b1fa2; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* FORMS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 13px; outline: none; transition: border 0.2s; background: white;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .calc-preview { background: var(--green-light); border: 1px solid #a8d5b5; border-radius: 8px; padding: 14px 16px; margin: 14px 0; }
  .calc-preview h4 { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .calc-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .calc-row.total { font-weight: 700; border-top: 1px solid #a8d5b5; margin-top: 6px; padding-top: 6px; color: var(--green); }
  .calc-row .amt { font-weight: 600; }

  /* BUTTONS */
  .btn { padding: 9px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: var(--green-mid); }
  .btn-secondary { background: var(--gray); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #a93226; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: var(--gold-dark); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

  /* TABLES */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f7f7f7; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 2px solid var(--border); }
  tbody td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tbody tr:hover { background: #fafafa; }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge-pending { background: #fff3cd; color: #856404; }
  .badge-approved { background: #d1e7dd; color: #0f5132; }
  .badge-rejected { background: #f8d7da; color: #842029; }
  .badge-disbursed { background: #cfe2ff; color: #084298; }
  .badge-reconciled { background: #e8f5e9; color: #1b5e20; }
  .badge-active { background: #d1e7dd; color: #0f5132; }
  .badge-completed { background: #e8f5e9; color: #1b5e20; }
  .badge-partial { background: #fff3cd; color: #856404; }
  .badge-fulfilled { background: #d1e7dd; color: #0f5132; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 14px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal-lg { max-width: 720px; }
  .modal h3 { font-size: 17px; font-weight: 700; color: var(--green); margin-bottom: 20px; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal-close:hover { color: var(--red); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* ALERTS */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .alert-success { background: #d1e7dd; color: #0f5132; border: 1px solid #a3cfbb; }
  .alert-error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
  .alert-info { background: #cfe2ff; color: #084298; border: 1px solid #9ec5fe; }
  .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffecb5; }

  /* TABS */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 9px 18px; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* PROGRESS BAR */
  .progress-bar { background: #e9ecef; border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 20px; transition: width 0.5s; }

  /* POT CARDS */
  .pots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .pot-card { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-left: 5px solid var(--green); }
  .pot-card.gold { border-left-color: var(--gold); }
  .pot-card.blue { border-left-color: var(--blue); }
  .pot-card.red { border-left-color: var(--red); }
  .pot-card.purple { border-left-color: #7b1fa2; }
  .pot-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; }
  .pot-balance { font-size: 24px; font-weight: 700; color: var(--text); }
  .pot-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* UTILITY */
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-gold { color: var(--gold); }
  .text-muted { color: var(--muted); }
  .font-bold { font-weight: 700; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .hidden { display: none !important; }
  .loading { text-align: center; padding: 30px; color: var(--muted); }

  @media (max-width: 768px) {
    .sidebar { width: 200px; }
    .main { margin-left: 200px; padding: 16px; }
    .form-grid, .form-grid.three { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<!-- MAIN APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">

async function loadNotifications() {
  if (!currentUser) return;
  const { data } = await db.from('notifications').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false}).limit(20);
  const unread = (data||[]).filter(n => !n.is_read);
  const count = unread.length;

  // Update in-app bell badge
  const badge = document.getElementById('notif-count');
  if (badge) { badge.textContent = count; badge.classList.toggle('hidden', count === 0); }

  // Update PWA app icon badge
  if ('setAppBadge' in navigator) {
    if (count > 0) {
      navigator.setAppBadge(count).catch(() => {});
    } else {
      navigator.clearAppBadge().catch(() => {});
    }
  }

  const list = document.getElementById('notif-list');
  if (!list) return;
  if (!data || !data.length) { list.innerHTML = '<div class="notif-empty">No notifications yet</div>'; return; }
  list.innerHTML = data.map(n => `
    <div class="notif-item ${n.is_read?'':'unread'}" onclick="markNotifRead('${n.id}')">

// Recalculate all pot balances from actual records
async function recalculatePotBalances() {
  const [{ data: income }, { data: welfare_d }, { data: sw }, { data: transfers }, { data: requests }, { data: pledgePayments }] = await Promise.all([
    db.from('income_records').select('tithe_amount,savings_amount,operational_amount,womens_ministry_amount,youth_ministry_amount,children_ministry_amount,welfare_amount'),
    db.from('welfare_disbursements').select('amount'),
    db.from('savings_withdrawals').select('amount'),
    db.from('fund_transfers').select('from_fund,to_fund,amount'),
    db.from('fund_requests').select('fund_source,amount_requested,amount_returned,status'),
    db.from('pledge_payments').select('amount')
  ]);

  const pots = { tithe:0, savings:0, operational:0, womens_ministry:0, youth_ministry:0, children_ministry:0, welfare:0 };

  // Sum directly from stored column values — don't recalculate, trust what's in the DB
  (income||[]).forEach(r => {
    pots.tithe += parseFloat(r.tithe_amount||0);
    pots.savings += parseFloat(r.savings_amount||0);
    pots.operational += parseFloat(r.operational_amount||0);
    pots.womens_ministry += parseFloat(r.womens_ministry_amount||0);
    pots.youth_ministry += parseFloat(r.youth_ministry_amount||0);
    pots.children_ministry += parseFloat(r.children_ministry_amount||0);
    pots.welfare += parseFloat(r.welfare_amount||0);
  });

  // Add pledge payments to operational
  (pledgePayments||[]).forEach(p => { pots.operational += parseFloat(p.amount||0); });

  // Subtract welfare disbursements
  (welfare_d||[]).forEach(d => { pots.welfare -= parseFloat(d.amount||0); });

  // Subtract savings withdrawals
  (sw||[]).forEach(w => { pots.savings -= parseFloat(w.amount||0); });

  // Apply transfers
  (transfers||[]).forEach(t => {
    if (pots[t.from_fund] !== undefined) pots[t.from_fund] -= parseFloat(t.amount||0);
    if (pots[t.to_fund] !== undefined) pots[t.to_fund] += parseFloat(t.amount||0);
  });

  // Subtract disbursed/reconciled requests, add back returned amounts
  (requests||[]).forEach(r => {
    if (['disbursed','reconciled'].includes(r.status)) {
      if (pots[r.fund_source] !== undefined) pots[r.fund_source] -= parseFloat(r.amount_requested||0);
    }
    if (r.status === 'reconciled' && parseFloat(r.amount_returned||0) > 0) {
      if (pots[r.fund_source] !== undefined) pots[r.fund_source] += parseFloat(r.amount_returned||0);
    }
  });

  // Update all pots
  await Promise.all(Object.entries(pots).map(([name, balance]) =>
    db.from('fund_pots').update({ balance: Math.max(0, Math.round(balance * 100) / 100), updated_at: new Date().toISOString() }).eq('name', name)
  ));

  await loadGlobalData();
}

async function loadGlobalData() {
  const [{ data: pots }, { data: settings }, { data: users }] = await Promise.all([
    db.from('fund_pots').select('*'),
    db.from('settings').select('*'),
    db.from('users').select('id, name, username, role, department, is_active, email')
  ]);
  if (pots) pots.forEach(p => appData.pots[p.name] = p);
  if (settings) settings.forEach(s => appData.settings[s.key] = s.value);
  if (users) appData.users = users;
}

}

async function loadDashboard() {
  // Load global data fresh without auto-recalculating (recalc only on manual Sync)
  await loadGlobalData();
  // Ministry leads with own funds get mini dashboard
  if (MINISTRY_OFFERING_ROLES.includes(currentUser.role)) {
    loadMinistryDashboard();
    return;
  }
  // Standard dept heads get dept dashboard
  if (currentUser.role === 'department_head') {
    loadDeptDashboard();
    return;
  }
  document.getElementById('dash-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const pots = appData.pots;
  const potDefs = [
    { key:'tithe', label:'Tithe Fund', color:'gold', icon:'✝' },
    { key:'savings', label:'Church Savings (60%)', color:'', icon:'◈' },
    { key:'operational', label:'Operational (40%)', color:'blue', icon:'⚙' },
    { key:'womens_ministry', label:"Women's Ministry", color:'purple', icon:'♀' },
    { key:'youth_ministry', label:"Youth Ministry", color:'purple', icon:'★' },
    { key:'children_ministry', label:"Children's Ministry", color:'purple', icon:'♦' },
    { key:'welfare', label:'Welfare Fund', color:'red', icon:'♥' }
  ];
  document.getElementById('pots-grid').innerHTML = potDefs.map(p => `
    <div class="pot-card ${p.color}">
      <div class="pot-name">${p.icon} ${p.label}</div>
      <div class="pot-balance">${fmt(pots[p.key]?.balance || 0)}</div>
      <div class="pot-sub">Current balance</div>
    </div>
  `).join('');

  // Month summary
  const now = new Date();
  const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const { data: monthIncome } = await db.from('income_records').select('*').gte('service_date', firstDay);
  const totalIn = (monthIncome||[]).reduce((s,r) => s + parseFloat(r.total_amount||0), 0);
  const totalTithe = (monthIncome||[]).reduce((s,r) => s + parseFloat(r.tithe_amount||0), 0);
  const { data: monthExp } = await db.from('fund_requests').select('amount_spent').eq('status','reconciled').gte('reconciled_at', firstDay+'T00:00:00');
  const totalExp = (monthExp||[]).reduce((s,r) => s + parseFloat(r.amount_spent||0), 0);
  document.getElementById('month-summary').innerHTML = `
    <div class="calc-row"><span>Total Income Received</span><span class="amt text-green">${fmt(totalIn)}</span></div>
    <div class="calc-row"><span>Tithe Deducted (10%)</span><span class="amt text-gold">${fmt(totalTithe)}</span></div>
    <div class="calc-row"><span>Total Expenses (Reconciled)</span><span class="amt text-red">${fmt(totalExp)}</span></div>
    <div class="calc-row total"><span>Services Recorded</span><span>${(monthIncome||[]).length}</span></div>
  `;

  // Pending requests
  const { data: pending } = await db.from('fund_requests').select('*').eq('status','pending').order('created_at',{ascending:false}).limit(5);

    document.getElementById('pending-requests-dash').innerHTML = '<div class="empty-state"><p>No pending requests</p></div>';

async function loadDeptDashboard() {
  const now = new Date();
  const filterMonth = document.getElementById('dept-dash-month')?.value || '';
  const filterYear = document.getElementById('dept-dash-year')?.value || '';

  let query = db.from('fund_requests').select('*').eq('requested_by', currentUser.id);
  if (filterMonth && filterYear) {
    const fm = `${filterYear}-${filterMonth.padStart(2,'0')}-01`;
    const lm = new Date(parseInt(filterYear), parseInt(filterMonth), 0).toISOString().split('T')[0];
    query = query.gte('created_at', fm+'T00:00:00').lte('created_at', lm+'T23:59:59');
  } else if (filterYear) {
    query = query.gte('created_at', filterYear+'-01-01T00:00:00').lte('created_at', filterYear+'-12-31T23:59:59');

  const { data: reqs } = await query.order('created_at',{ascending:false});

  const totalApproved = all.filter(r=>['approved','disbursed','reconciled'].includes(r.status)).reduce((s,r)=>s+parseFloat(r.amount_requested||0),0);
  const totalSpent = all.filter(r=>r.status==='reconciled').reduce((s,r)=>s+parseFloat(r.amount_spent||0),0);

      <div class="mt-8" style="font-size:13px;">

async function saveQuarterlyBudget() {
  const year = document.getElementById('bq-year').value;
  const quarter = document.getElementById('bq-quarter').value;
  const amount = parseFloat(document.getElementById('bq-amount').value||0);
  const notes = document.getElementById('bq-notes').value;

}

function calcIncomeSplit() {
  const type = document.getElementById('inc-type')?.value;
  const general = parseFloat(document.getElementById('inc-general')?.value||0);
  const directTithe = parseFloat(document.getElementById('inc-tithe-direct')?.value||0);
  const welfare = parseFloat(document.getElementById('inc-welfare')?.value||0);
  const womens = parseFloat(document.getElementById('inc-womens')?.value||0);
  const titheRate = parseFloat(appData.settings.tithe_rate||10)/100;
  const savingsRate = parseFloat(appData.settings.savings_rate||60)/100;
  const opRate = parseFloat(appData.settings.operational_rate||40)/100;

  const wg = document.getElementById('inc-womens-group');
  if (wg) wg.style.display = (type === 'womens_ministry') ? 'flex' : 'none';
  const yg = document.getElementById('inc-youth-group');
  if (yg) yg.style.display = (type === 'youth_ministry') ? 'flex' : 'none';
  const cg = document.getElementById('inc-children-group');
  if (cg) cg.style.display = (type === 'children_ministry') ? 'flex' : 'none';

  const preview = document.getElementById('income-calc-preview');
  if (!preview) return;

  if (type === 'welfare') {
    preview.innerHTML = `<h4>📊 Allocation Preview</h4>
      <div class="calc-row"><span>Welfare Offering</span><span class="amt">${fmt(welfare)}</span></div>
      <div class="calc-row total"><span>→ Goes to Welfare Fund</span><span class="amt text-red">${fmt(welfare)}</span></div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;">⚠ No church tithe is deducted from welfare offerings</div>`;
    return;
  }

  if (type === 'womens_ministry') {
    const wTithe = womens * titheRate;
    const remaining = womens - wTithe;
    const combined = general + directTithe;
    const churchTithe = combined * titheRate;
    const afterTithe = combined - churchTithe;
    const savings = afterTithe * savingsRate;
    const operational = afterTithe * opRate;
    preview.innerHTML = `<h4>📊 Allocation Preview</h4>
      <div class="calc-row"><span>General Offering</span><span class="amt">${fmt(general)}</span></div>
      <div class="calc-row"><span>Tithe Received</span><span class="amt text-gold">${fmt(directTithe)}</span></div>
      <div class="calc-row"><span>├─ Church Tithe (${appData.settings.tithe_rate||10}% of GH₵${combined.toFixed(2)})</span><span class="amt text-gold">${fmt(churchTithe)}</span></div>
      <div class="calc-row"><span>├─ Church Savings (${appData.settings.savings_rate||60}%)</span><span class="amt text-green">${fmt(savings)}</span></div>
      <div class="calc-row"><span>└─ Operational (${appData.settings.operational_rate||40}%)</span><span class="amt">${fmt(operational)}</span></div>
      <hr class="divider">
      <div class="calc-row"><span>Women's Ministry Offering</span><span class="amt">${fmt(womens)}</span></div>
      <div class="calc-row"><span>├─ Tithe (${appData.settings.tithe_rate||10}%)</span><span class="amt text-gold">${fmt(wTithe)}</span></div>
      <div class="calc-row"><span>└─ Women's Fund (ring-fenced)</span><span class="amt" style="color:#7b1fa2">${fmt(remaining)}</span></div>
      ${welfare > 0 ? `<div class="calc-row"><span>Welfare Offering</span><span class="amt text-red">${fmt(welfare)}</span></div>` : ''}`;
    return;
  }

  const combined = general + directTithe;
  const churchTithe = combined * titheRate;
  const afterTithe = combined - churchTithe;
  const savings = afterTithe * savingsRate;
  const operational = afterTithe * opRate;
  const total = combined + welfare;

  preview.innerHTML = `<h4>📊 Automatic Allocation Preview</h4>
    <div class="calc-row"><span>General Offering</span><span class="amt">${fmt(general)}</span></div>
    <div class="calc-row"><span>Tithe Received</span><span class="amt text-gold">${fmt(directTithe)}</span></div>
    <div class="calc-row"><span>Combined Total</span><span class="amt font-bold">${fmt(combined)}</span></div>
    <hr class="divider">
    <div class="calc-row"><span>├─ Church Tithe (${appData.settings.tithe_rate||10}%) → Tithe Fund</span><span class="amt text-gold">${fmt(churchTithe)}</span></div>
    <div class="calc-row"><span>├─ Church Savings (${appData.settings.savings_rate||60}%)</span><span class="amt text-green">${fmt(savings)}</span></div>
    <div class="calc-row"><span>└─ Operational Fund (${appData.settings.operational_rate||40}%)</span><span class="amt">${fmt(operational)}</span></div>
    ${welfare > 0 ? `<div class="calc-row"><span>Welfare Offering (separate fund)</span><span class="amt text-red">${fmt(welfare)}</span></div>` : ''}
    <div class="calc-row total"><span>Total Recorded</span><span>${fmt(total)}</span></div>`;
}

async function saveIncome() {
  const type = document.getElementById('inc-type').value;
  const date = document.getElementById('inc-date').value;
  const general = parseFloat(document.getElementById('inc-general')?.value||0);
  const directTithe = parseFloat(document.getElementById('inc-tithe-direct')?.value||0);
  const welfare = parseFloat(document.getElementById('inc-welfare')?.value||0);
  const womens = parseFloat(document.getElementById('inc-womens')?.value||0);
  const youth = parseFloat(document.getElementById('inc-youth')?.value||0);
  const children = parseFloat(document.getElementById('inc-children')?.value||0);
  const notes = document.getElementById('inc-notes').value;
  const msg = document.getElementById('income-msg');

  if (!date) { msg.innerHTML = '<div class="alert alert-error">Please select a service date</div>'; return; }
  const combined = general + directTithe;
  if (combined <= 0 && welfare <= 0 && womens <= 0 && youth <= 0 && children <= 0) { msg.innerHTML = '<div class="alert alert-error">Please enter at least one amount</div>'; return; }

  const titheRate = parseFloat(appData.settings.tithe_rate||10)/100;
  const savingsRate = parseFloat(appData.settings.savings_rate||60)/100;
  const opRate = parseFloat(appData.settings.operational_rate||40)/100;

  let tithe = 0, savings = 0, operational = 0, womens_amt = 0, welfare_amt = welfare, youth_amt = 0, children_amt = 0;

  const ministryOfferingAmt = type === 'womens_ministry' ? womens : type === 'youth_ministry' ? youth : type === 'children_ministry' ? children : 0;
  const ministryPotKey = type === 'womens_ministry' ? 'womens_ministry' : type === 'youth_ministry' ? 'youth_ministry' : type === 'children_ministry' ? 'children_ministry' : null;

  if (type === 'welfare') {
    welfare_amt = welfare;
  } else if (ministryPotKey) {
    const mTithe = ministryOfferingAmt * titheRate;
    const mRest = ministryOfferingAmt - mTithe;
    if (type === 'womens_ministry') womens_amt = mRest;
    if (type === 'youth_ministry') youth_amt = mRest;
    if (type === 'children_ministry') children_amt = mRest;
    tithe = mTithe + (combined * titheRate);
    const afterTithe = combined - (combined * titheRate);
    savings = afterTithe * savingsRate;
    operational = afterTithe * opRate;
  } else {
    tithe = combined * titheRate;
    const afterTithe = combined - tithe;
    savings = afterTithe * savingsRate;
    operational = afterTithe * opRate;
  }

  const total = type === 'welfare' ? welfare : combined + welfare + ministryOfferingAmt;

  try {
    const { data: rec, error } = await db.from('income_records').insert({
      service_date: date, service_type: type, total_amount: total,
      tithe_amount: tithe, savings_amount: savings, operational_amount: operational,
      womens_ministry_amount: womens_amt, welfare_amount: welfare_amt,
      youth_ministry_amount: youth_amt, children_ministry_amount: children_amt,
      notes, recorded_by: currentUser.id
    }).select().single();
    if (error) throw error;

    await Promise.all([
      tithe > 0 && incrementPot('tithe', tithe),
      savings > 0 && incrementPot('savings', savings),
      operational > 0 && incrementPot('operational', operational),
      womens_amt > 0 && incrementPot('womens_ministry', womens_amt),
      welfare_amt > 0 && incrementPot('welfare', welfare_amt),
      youth_amt > 0 && incrementPot('youth_ministry', youth_amt),
      children_amt > 0 && incrementPot('children_ministry', children_amt),
    ].filter(Boolean));

    await logAudit('INCOME_RECORDED', 'income_records', rec.id, { total, type, date });
    msg.innerHTML = '<div class="alert alert-success">✓ Income recorded successfully and funds allocated to pots</div>';
    clearIncomeForm();
    await loadGlobalData();
    loadIncome();
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
  }
}

async function incrementPot(potName, amount) {
  const current = parseFloat(appData.pots[potName]?.balance || 0);
  await db.from('fund_pots').update({ balance: current + amount, updated_at: new Date().toISOString() }).eq('name', potName);
}

async function decrementPot(potName, amount) {
  const current = parseFloat(appData.pots[potName]?.balance || 0);
  const newBal = Math.max(0, current - amount);
  await db.from('fund_pots').update({ balance: newBal, updated_at: new Date().toISOString() }).eq('name', potName);
}

async function saveEditIncome(id, oldTithe, oldSavings, oldOp, oldWomens, oldWelfare) {
  const date = document.getElementById('ei-date').value;
  const type = document.getElementById('ei-type').value;
  const general = parseFloat(document.getElementById('ei-general').value||0);
  const directTithe = parseFloat(document.getElementById('ei-tithe').value||0);
  const welfare = parseFloat(document.getElementById('ei-welfare').value||0);
  const womens = parseFloat(document.getElementById('ei-womens').value||0);
  const notes = document.getElementById('ei-notes').value;
  const titheRate = parseFloat(appData.settings.tithe_rate||10)/100;
  const savingsRate = parseFloat(appData.settings.savings_rate||60)/100;
  const opRate = parseFloat(appData.settings.operational_rate||40)/100;

  let tithe=0, savings=0, operational=0, womens_amt=0, welfare_amt=welfare;
  const combined = general + directTithe;
  if (type==='welfare') { welfare_amt=welfare; }
  else if (type==='womens_ministry') {
    const wTithe = womens*titheRate; womens_amt=womens-wTithe;
    tithe = wTithe + combined*titheRate;
    const at = combined - combined*titheRate; savings=at*savingsRate; operational=at*opRate;
  } else {
    tithe=combined*titheRate; const at=combined-tithe; savings=at*savingsRate; operational=at*opRate;
  }
  const total = type==='welfare' ? welfare : combined+welfare+womens;

  // Reverse old, apply new
  await loadGlobalData();
  await Promise.all([
    decrementPot('tithe', parseFloat(oldTithe)), decrementPot('savings', parseFloat(oldSavings)),
    decrementPot('operational', parseFloat(oldOp)), decrementPot('womens_ministry', parseFloat(oldWomens)),
    decrementPot('welfare', parseFloat(oldWelfare))
  ]);
  await loadGlobalData();
  await Promise.all([
    tithe>0 && incrementPot('tithe',tithe), savings>0 && incrementPot('savings',savings),
    operational>0 && incrementPot('operational',operational), womens_amt>0 && incrementPot('womens_ministry',womens_amt),
    welfare_amt>0 && incrementPot('welfare',welfare_amt)
  ].filter(Boolean));

  await db.from('income_records').update({ service_date:date, service_type:type, total_amount:total, tithe_amount:tithe, savings_amount:savings, operational_amount:operational, womens_ministry_amount:womens_amt, welfare_amount:welfare_amt, notes }).eq('id',id);
  await logAudit('INCOME_EDITED','income_records',id,{total,type,date});
  closeModal('edit-income'); await loadGlobalData(); loadIncome();
}

async function deleteIncomeRecord(id, tithe, savings, op, womens, welfare) {
  if (!confirm('Delete this income record? This will reverse the fund allocations.')) return;
  await loadGlobalData();
  await Promise.all([
    decrementPot('tithe', parseFloat(tithe)), decrementPot('savings', parseFloat(savings)),
    decrementPot('operational', parseFloat(op)), decrementPot('womens_ministry', parseFloat(womens)),
    decrementPot('welfare', parseFloat(welfare))
  ]);
  await db.from('income_records').delete().eq('id', id);
  await logAudit('INCOME_DELETED','income_records',id,{tithe,savings,op});
  await loadGlobalData(); loadIncome();
}

function switchTab(pageId, tabId) {
  const page = document.getElementById('page-' + pageId);
  page.querySelectorAll('.tab').forEach((t,i) => {
    const panels = page.querySelectorAll('.tab-panel');
    t.classList.toggle('active', t.textContent.toLowerCase().includes(tabId.replace('-',' ').toLowerCase()) || (i===0 && tabId==='campaigns') || (i===1 && tabId==='pledges-list'));
  });
  page.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

function recordPledgePayment(pledgeId, pledgerName, pledgedAmt, fulfilledAmt) {
  const outstanding = pledgedAmt - fulfilledAmt;

async function savePledgePayment(pledgeId, pledgedAmt, fulfilledAmt) {
  const amount = parseFloat(document.getElementById('pp-amount').value||0);
  const date = document.getElementById('pp-date').value;
  const notes = document.getElementById('pp-notes').value;
  if (amount <= 0 || !date) { document.getElementById('pp-msg').innerHTML = '<div class="alert alert-error">Amount and date required</div>'; return; }
  const newFulfilled = fulfilledAmt + amount;
  const status = newFulfilled >= pledgedAmt ? 'fulfilled' : 'partial';
  await db.from('pledge_payments').insert({ pledge_id: pledgeId, amount, payment_date: date, notes, recorded_by: currentUser.id });
  await db.from('pledges').update({ fulfilled_amount: newFulfilled, status }).eq('id', pledgeId);
  await incrementPot('operational', amount);
  closeModal('pledge-payment');
  loadCampaigns(); loadAllPledges();
}

async function saveWelfareDisbursement() {
  const name = document.getElementById('w-name').value.trim();
  const phone = document.getElementById('w-phone').value.trim();
  const amount = parseFloat(document.getElementById('w-amount').value||0);
  const date = document.getElementById('w-date').value;
  const purpose = document.getElementById('w-purpose').value.trim();

  if (error) { msg.innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  await decrementPot('welfare', amount);
  await logAudit('WELFARE_DISBURSED', 'welfare_disbursements', null, { recipient: name, amount, date });
  msg.innerHTML = '<div class="alert alert-success">✓ Welfare disbursement recorded</div>';

function editWelfareDisbursement(id, recipientName, amount, date, purpose) {
  openModal('edit-welfare', `
    <button class="modal-close" onclick="closeModal('edit-welfare')">✕</button>
    <h3>✏ Edit Welfare Disbursement</h3>
    <div class="form-grid">
      <div class="form-group"><label>Recipient Name</label><input type="text" id="ew-name" value="${recipientName}"></div>
      <div class="form-group"><label>Amount (GH₵)</label><input type="number" id="ew-amount" value="${amount}" min="0" step="0.01"></div>
      <div class="form-group"><label>Date</label><input type="date" id="ew-date" value="${date}"></div>
      <div class="form-group full"><label>Purpose</label><textarea id="ew-purpose">${purpose}</textarea></div>
    </div>
    <div id="ew-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('edit-welfare')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditWelfare('${id}',${amount})">Save Changes</button>
    </div>
  `);
}

async function saveEditWelfare(id, oldAmount) {
  const name = document.getElementById('ew-name').value.trim();
  const newAmount = parseFloat(document.getElementById('ew-amount').value||0);
  const date = document.getElementById('ew-date').value;
  const purpose = document.getElementById('ew-purpose').value.trim();
  if (!name || newAmount <= 0 || !date || !purpose) { document.getElementById('ew-msg').innerHTML = '<div class="alert alert-error">All fields required</div>'; return; }
  const diff = newAmount - parseFloat(oldAmount);
  if (diff > 0) {
    const bal = parseFloat(appData.pots['welfare']?.balance||0);
    if (diff > bal) { document.getElementById('ew-msg').innerHTML = `<div class="alert alert-error">Insufficient welfare funds for increase</div>`; return; }
    await decrementPot('welfare', diff);
  } else if (diff < 0) {
    await incrementPot('welfare', Math.abs(diff));
  }
  await db.from('welfare_disbursements').update({ recipient_name:name, amount:newAmount, disbursement_date:date, purpose }).eq('id', id);
  await logAudit('WELFARE_EDITED','welfare_disbursements',id,{name,newAmount});
  closeModal('edit-welfare'); await loadGlobalData(); loadWelfare();
}

async function deleteWelfareDisbursement(id, amount) {
  if (!confirm('Delete this disbursement? The amount will be returned to the welfare fund.')) return;
  await db.from('welfare_disbursements').delete().eq('id', id);
  await loadGlobalData();
  await incrementPot('welfare', parseFloat(amount));
  await logAudit('WELFARE_DELETED','welfare_disbursements',id,{amount});
  await loadGlobalData(); loadWelfare();
}

function updateTransferBalance() {
  const from = document.getElementById('tr-from')?.value;
  if (!from) return;
  const bal = parseFloat(appData.pots[from]?.balance||0);
  const info = document.getElementById('tr-balance-info');
  if (info) { info.style.display='block'; info.textContent = `Available in ${from.replace(/_/g,' ')}: ${fmt(bal)}`; }
}

async function saveFundTransfer() {
  const from = document.getElementById('tr-from').value;
  const to = document.getElementById('tr-to').value;
  const amount = parseFloat(document.getElementById('tr-amount').value||0);
  const date = document.getElementById('tr-date').value;
  const reason = document.getElementById('tr-reason').value.trim();
  const msg = document.getElementById('tr-msg');

  if (from === to) { msg.innerHTML = '<div class="alert alert-error">From and To funds cannot be the same</div>'; return; }
  if (amount <= 0 || !date || !reason) { msg.innerHTML = '<div class="alert alert-error">All fields are required</div>'; return; }
  await loadGlobalData();
  const balance = parseFloat(appData.pots[from]?.balance||0);
  if (amount > balance) { msg.innerHTML = `<div class="alert alert-error">Insufficient funds in ${from.replace(/_/g,' ')}. Available: ${fmt(balance)}</div>`; return; }

  const { error } = await db.from('fund_transfers').insert({
    from_fund: from, to_fund: to, amount, transfer_date: date,
    reason, transferred_by: currentUser.id
  });
  if (error) { msg.innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }

  await decrementPot(from, amount);
  await loadGlobalData();
  await incrementPot(to, amount);
  await logAudit('FUND_TRANSFER', 'fund_transfers', null, { from, to, amount, reason, date });

  msg.innerHTML = `<div class="alert alert-success">✓ Transfer of ${fmt(amount)} from <strong>${from.replace(/_/g,' ')}</strong> to <strong>${to.replace(/_/g,' ')}</strong> completed and documented</div>`;
  document.getElementById('tr-amount').value = '';
  document.getElementById('tr-reason').value = '';
  await loadGlobalData();
  loadSavings();
  loadTransferHistory();
}

  const reason = document.getElementById('sw-reason').value.trim();
  const msg = document.getElementById('sw-msg');
  if (amount <= 0 || !date || !reason) { msg.innerHTML = '<div class="alert alert-error">All fields required</div>'; return; }
  const balance = parseFloat(appData.pots['savings']?.balance||0);

  const { error } = await db.from('savings_withdrawals').insert({ amount, reason, withdrawal_date: date, approved_by: currentUser.id, notes: '' });

  await decrementPot('savings', amount);
  await logAudit('SAVINGS_WITHDRAWAL', 'savings_withdrawals', null, { amount, reason, date });
  msg.innerHTML = '<div class="alert alert-success">✓ Savings withdrawal recorded</div>';
  document.getElementById('sw-amount').value = ''; document.getElementById('sw-reason').value = '';
  await loadGlobalData(); loadSavings();
}

async function deleteSavingsWithdrawal(id, amount) {
  if (!confirm('Delete this withdrawal record? The amount will be returned to savings.')) return;
  await db.from('savings_withdrawals').delete().eq('id', id);
  await loadGlobalData();
  await incrementPot('savings', parseFloat(amount));
  await logAudit('SAVINGS_WITHDRAWAL_DELETED','savings_withdrawals',id,{amount});
  await loadGlobalData(); loadSavings();
}

function pageRequests() {
  return `
    <div class="page-header"><h2>⇌ Fund Requests</h2><p>Submit, approve, disburse and reconcile department fund requests</p></div>
    <div id="req-actions" style="display:flex;justify-content:flex-end;margin-bottom:14px;"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchReqTab('pending')">Pending</button>
      <button class="tab" onclick="switchReqTab('approved')">Approved / Disbursed</button>
      <button class="tab" onclick="switchReqTab('reconciled')">Reconciled</button>
      <button class="tab" onclick="switchReqTab('all')">All Requests</button>
    </div>
    <div id="requests-table"></div>
  `;
}

let currentReqTab = 'pending';
function switchReqTab(tab) {
  currentReqTab = tab;
  document.querySelectorAll('#page-requests .tab').forEach((t,i) => {
    t.classList.toggle('active', ['pending','approved','reconciled','all'][i] === tab);
  });
  loadRequests();
}

async function loadRequests() {
  // Show submit button for dept heads / womens lead
  const actEl = document.getElementById('req-actions');
  if (actEl && ['department_head','womens_ministry_lead','finance_admin','lead_pastor'].includes(currentUser.role)) {
    actEl.innerHTML = `<button class="btn btn-primary" onclick="openNewRequest()">+ New Fund Request</button>`;
  }

  let query = db.from('fund_requests').select('*, requested_by_user:users!fund_requests_requested_by_fkey(name,department), reviewed_by_user:users!fund_requests_reviewed_by_fkey(name)').order('created_at',{ascending:false});
  if (currentReqTab === 'pending') query = query.eq('status','pending');
  else if (currentReqTab === 'approved') query = query.in('status',['approved','disbursed']);
  else if (currentReqTab === 'reconciled') query = query.eq('status','reconciled');

  // Dept heads and ministry leads only see their own
  if ([...ALL_DEPT_ROLES].includes(currentUser.role)) {
    query = query.eq('requested_by', currentUser.id);
  }

  const { data } = await query.limit(50);
  const el = document.getElementById('requests-table');
  if (!data || !data.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No requests in this category</p></div>'; return; }

  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Ref</th><th>Dept</th><th>Amount</th><th>Fund</th><th>Purpose</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
    <tbody>${data.map(r => {
      const actions = getRequestActions(r);
      return `<tr>
        <td><strong>${r.request_number}</strong></td>
        <td>${r.department}</td>
        <td class="font-bold">${fmt(r.amount_requested)}</td>
        <td><span style="font-size:11px;background:#f0f0f0;padding:2px 8px;border-radius:10px;">${r.fund_source.replace('_',' ')}</span></td>
        <td>${r.purpose}</td>
        <td><span class="badge badge-${r.status}">${r.status}</span></td>
        <td>${fmtDate(r.created_at)}</td>
        <td style="white-space:nowrap;">${actions}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function getRequestActions(r) {
  const btns = [];
  btns.push(`<button class="btn btn-sm btn-secondary" onclick="viewRequest('${r.id}')">View</button>`);
  if (r.status === 'pending') {
    if (['lead_pastor','finance_admin'].includes(currentUser.role)) {
      btns.push(`<button class="btn btn-sm btn-primary" onclick="reviewRequest('${r.id}','approve')">✓ Approve</button>`);
      btns.push(`<button class="btn btn-sm btn-danger" onclick="reviewRequest('${r.id}','reject')">✗ Reject</button>`);
    }
    // Requester can delete their own pending request
    if (r.requested_by === currentUser.id || ['lead_pastor','finance_admin'].includes(currentUser.role)) {
      btns.push(`<button class="btn btn-sm btn-danger" onclick="deleteFundRequest('${r.id}')">🗑 Delete</button>`);
    }
  }
  if (r.status === 'rejected' && r.requested_by === currentUser.id) {
    btns.push(`<button class="btn btn-sm btn-gold" onclick="editAndResubmit('${r.id}')">✏ Edit & Resubmit</button>`);
    btns.push(`<button class="btn btn-sm btn-danger" onclick="deleteFundRequest('${r.id}')">🗑 Delete</button>`);
  }
  if (r.status === 'approved' && ['lead_pastor','finance_admin'].includes(currentUser.role)) {
    btns.push(`<button class="btn btn-sm btn-gold" onclick="disburseRequest('${r.id}',${r.amount_requested},'${r.fund_source}')">💸 Disburse</button>`);
  }
  if (r.status === 'disbursed' && (r.requested_by === currentUser.id || ['lead_pastor','finance_admin'].includes(currentUser.role))) {
    btns.push(`<button class="btn btn-sm btn-primary" onclick="reconcileRequest('${r.id}',${r.amount_requested})">📋 Reconcile</button>`);
  }
  return btns.join(' ');
}

function openNewRequest() {
  let fundOptions = '';
  if (currentUser.role === 'womens_ministry_lead') {
    fundOptions = `<option value="womens_ministry">Women's Ministry Fund</option>`;
  } else if (currentUser.role === 'youth_ministry_lead') {
    fundOptions = `<option value="youth_ministry">Youth Ministry Fund</option>`;
  } else if (currentUser.role === 'children_ministry_lead') {
    fundOptions = `<option value="children_ministry">Children's Ministry Fund</option>`;
  } else {
    fundOptions = `<option value="operational">Operational Fund</option>`;
    if (['lead_pastor','finance_admin'].includes(currentUser.role)) {
      fundOptions += `<option value="savings">Savings (exceptional only)</option>`;
    }
  }
  openModal('new-request', `
    <button class="modal-close" onclick="closeModal('new-request')">✕</button>
    <h3>New Fund Request</h3>
    <div class="form-grid">
      <div class="form-group"><label>Department</label><input type="text" id="rq-dept" value="${currentUser.department||''}" placeholder="Your department"></div>
      <div class="form-group"><label>Fund Source</label><select id="rq-fund">${fundOptions}</select></div>
      <div class="form-group"><label>Amount Requested (GH₵)</label><input type="number" id="rq-amount" placeholder="0.00" min="0" step="0.01"></div>
      <div class="form-group"><label>Purpose (brief title)</label><input type="text" id="rq-purpose" placeholder="e.g. Sound equipment purchase"></div>
      <div class="form-group full"><label>Full Description</label><textarea id="rq-desc" placeholder="Describe what the funds will be used for in detail..."></textarea></div>
    </div>
    <hr class="divider">
    <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px;">💳 Payment Account Details</div>
    <div class="form-grid">
      <div class="form-group"><label>Payment Method</label><select id="rq-pay-method">
        <option value="mobile_money">Mobile Money</option>
        <option value="bank">Bank Account</option>
        <option value="cash">Cash</option>
      </select></div>
      <div class="form-group"><label>Account Name</label><input type="text" id="rq-pay-name" placeholder="Name on account"></div>
      <div class="form-group full"><label>Account / MoMo Number</label><input type="text" id="rq-pay-number" placeholder="Account or mobile money number"></div>
    </div>
    <div id="rq-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('new-request')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRequest()">Submit Request</button>
    </div>
  `);
}

async function saveRequest() {
  const dept = document.getElementById('rq-dept').value.trim();
  const fund = document.getElementById('rq-fund').value;
  const amount = parseFloat(document.getElementById('rq-amount').value||0);
  const purpose = document.getElementById('rq-purpose').value.trim();
  const desc = document.getElementById('rq-desc').value.trim();
  const payMethod = document.getElementById('rq-pay-method').value;
  const payName = document.getElementById('rq-pay-name').value.trim();
  const payNumber = document.getElementById('rq-pay-number').value.trim();
  if (!dept || amount <= 0 || !purpose) { document.getElementById('rq-msg').innerHTML = '<div class="alert alert-error">Department, amount and purpose required</div>'; return; }
  const reqNum = 'REQ-' + new Date().getFullYear() + '-' + uid();
  const { error } = await db.from('fund_requests').insert({
    request_number: reqNum, department: dept, requested_by: currentUser.id,
    fund_source: fund, amount_requested: amount, purpose, description: desc,
    payment_method: payMethod, payment_account_name: payName, payment_account_number: payNumber
  });
  if (error) { document.getElementById('rq-msg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  await logAudit('FUND_REQUEST_SUBMITTED', 'fund_requests', null, { dept, amount, purpose });

  // Notify all admins — lead pastor, finance admin
  const { data: admins } = await db.from('users').select('id,name,email').in('role',['finance_admin','lead_pastor']).eq('is_active',true);
  const msg = `New fund request from ${currentUser.name} (${dept}):\n\nPurpose: ${purpose}\nAmount: ${fmt(amount)}\nFund: ${fund.replace(/_/g,' ')}\n\nPlease log in to review and approve.`;
  for (const admin of admins||[]) {
    await notifyUser(admin.id, 'New Fund Request Submitted', msg, 'fund_request', admin.email, admin.name);
  }
  closeModal('new-request');
  loadRequests();
}

function reviewRequest(reqId, action) {
  openModal('review-req', `
    <button class="modal-close" onclick="closeModal('review-req')">✕</button>
    <h3>${action === 'approve' ? '✓ Approve' : '✗ Reject'} Request</h3>
    <div class="form-group"><label>Notes / Reason</label><textarea id="rev-notes" placeholder="${action === 'reject' ? 'Reason for rejection...' : 'Optional approval notes...'}"></textarea></div>
    <div id="rev-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('review-req')">Cancel</button>
      <button class="btn ${action==='approve'?'btn-primary':'btn-danger'}" onclick="submitReview('${reqId}','${action}')">Confirm ${action==='approve'?'Approval':'Rejection'}</button>
    </div>
  `);
}

async function deleteFundRequest(id) {
  if (!confirm('Delete this fund request? This cannot be undone.')) return;
  await db.from('fund_requests').delete().eq('id', id);
  await logAudit('FUND_REQUEST_DELETED','fund_requests',id,{});
  loadRequests();
}

function editAndResubmit(reqId) {
  openModal('edit-resubmit', `
    <button class="modal-close" onclick="closeModal('edit-resubmit')">✕</button>

}

async function loadEditResubmitForm(reqId) {

  document.getElementById('edit-resubmit-form').innerHTML = `
    <div class="alert alert-error" style="margin-bottom:12px;"><strong>Rejection reason:</strong> ${r.review_notes||'No reason given'}</div>
    <div class="form-grid">
      <div class="form-group"><label>Amount (GH₵)</label><input type="number" id="er-amount" value="${r.amount_requested}" min="0" step="0.01"></div>
      <div class="form-group"><label>Purpose</label><input type="text" id="er-purpose" value="${r.purpose}"></div>

      <div class="form-group"><label>Account Name</label><input type="text" id="er-pay-name" value="${r.payment_account_name||''}"></div>
      <div class="form-group full"><label>Account / MoMo Number</label><input type="text" id="er-pay-number" value="${r.payment_account_number||''}"></div>
    </div>

    <div class="modal-footer">

      <button class="btn btn-primary" onclick="submitResubmit('${reqId}')">Resubmit Request</button>
    </div>
  `;
}

async function submitResubmit(reqId) {
  const amount = parseFloat(document.getElementById('er-amount').value||0);
  const purpose = document.getElementById('er-purpose').value.trim();
  const desc = document.getElementById('er-desc').value.trim();
  const payMethod = document.getElementById('er-pay-method').value;
  const payName = document.getElementById('er-pay-name').value.trim();
  const payNumber = document.getElementById('er-pay-number').value.trim();
  if (amount <= 0 || !purpose) { document.getElementById('er-msg').innerHTML = '<div class="alert alert-error">Amount and purpose required</div>'; return; }
  await db.from('fund_requests').update({
    status: 'pending', amount_requested: amount, purpose, description: desc,
    payment_method: payMethod, payment_account_name: payName, payment_account_number: payNumber,
    reviewed_by: null, review_notes: null, reviewed_at: null
  }).eq('id', reqId);
  await logAudit('FUND_REQUEST_RESUBMITTED','fund_requests',reqId,{amount,purpose});
  // Notify admins
  const { data: admins } = await db.from('users').select('id,name,email').in('role',['finance_admin','lead_pastor']).eq('is_active',true);
  for (const admin of admins||[]) {
    await notifyUser(admin.id,'Fund Request Resubmitted',`${currentUser.name} has edited and resubmitted a fund request for ${fmt(amount)} — "${purpose}"`, 'fund_request', admin.email, admin.name);
  }
  closeModal('edit-resubmit');
  loadRequests();
}

async function submitReview(reqId, action) {
  const notes = document.getElementById('rev-notes').value;
  const status = action === 'approve' ? 'approved' : 'rejected';
  const { data: req } = await db.from('fund_requests').select('*, requested_by_user:users!fund_requests_requested_by_fkey(id,name,email)').eq('id',reqId).single();
  const { error } = await db.from('fund_requests').update({ status, reviewed_by: currentUser.id, review_notes: notes, reviewed_at: new Date().toISOString() }).eq('id', reqId);
  if (error) { document.getElementById('rev-msg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  await logAudit('FUND_REQUEST_'+status.toUpperCase(), 'fund_requests', reqId, { notes });
  // Notify requester
  if (req?.requested_by_user) {
    const u = req.requested_by_user;
    const emailMsg = action === 'approve'
      ? `Dear ${u.name},\n\nYour fund request has been APPROVED.\n\nRequest: ${req.purpose}\nAmount: ${fmt(req.amount_requested)}\nRef: ${req.request_number}\n\nFunds will be disbursed to you shortly. Please log in to track the status.`
      : `Dear ${u.name},\n\nYour fund request has been REJECTED.\n\nRequest: ${req.purpose}\nAmount: ${fmt(req.amount_requested)}\nRef: ${req.request_number}\nReason: ${notes||'No reason given'}\n\nYou may edit and resubmit your request from the Fund Requests page.`;
    await notifyUser(u.id, `Fund Request ${action==='approve'?'Approved ✓':'Rejected ✗'}`, emailMsg, 'fund_request', u.email, u.name);
  }
  closeModal('review-req');
  loadRequests();
}

async function disburseRequest(reqId, amount, fundSource) {
  const balance = parseFloat(appData.pots[fundSource]?.balance||0);
  if (amount > balance) {
    openModal('disburse-err', `
      <button class="modal-close" onclick="closeModal('disburse-err')">✕</button>
      <h3>⚠ Insufficient Funds</h3>
      <div class="alert alert-error">The ${fundSource.replace(/_/g,' ')} fund has ${fmt(balance)} but this request requires ${fmt(amount)}.</div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('disburse-err')">Close</button></div>
    `); return;
  }
  if (!confirm(`Disburse ${fmt(amount)} from ${fundSource.replace(/_/g,' ')} fund?`)) return;
  const { data: req } = await db.from('fund_requests').select('*, requested_by_user:users!fund_requests_requested_by_fkey(id,name,email)').eq('id',reqId).single();
  await db.from('fund_requests').update({ status: 'disbursed', disbursed_at: new Date().toISOString(), disbursed_by: currentUser.id }).eq('id', reqId);
  await decrementPot(fundSource, amount);
  await logAudit('FUND_DISBURSED', 'fund_requests', reqId, { amount, fundSource });
  if (req?.requested_by_user) {
    const u = req.requested_by_user;
    await notifyUser(u.id,'Funds Disbursed',`Your fund request "${req.purpose}" — ${fmt(amount)} has been disbursed. Please reconcile after use.`,'disbursement', u.email, u.name);
  }
  await loadGlobalData();
  loadRequests();
}

function reconcileRequest(reqId, disbursedAmount) {
  const churchMomo = appData.settings.church_momo || 'Not configured — set in System Settings';
  const churchBank = appData.settings.church_bank || 'Not configured — set in System Settings';
  const churchAccountName = appData.settings.church_account_name || 'Mighty Army Network';
  openModal('reconcile-req', `
    <button class="modal-close" onclick="closeModal('reconcile-req')">✕</button>
    <h3>📋 Reconcile Fund Request</h3>
    <div class="alert alert-info">Enter the actual amount spent. If you did not spend all the money, return the balance to the church account below.</div>
    <div style="background:#fff8e1;border:2px solid #f9c74f;border-radius:8px;padding:16px;margin-bottom:16px;">
      <div style="font-size:13px;font-weight:700;color:#856404;margin-bottom:10px;">🏦 RETURN UNSPENT FUNDS TO CHURCH — Send to:</div>
      <div style="font-size:15px;font-weight:700;color:#1a1a1a;">${churchAccountName}</div>
      <div style="font-size:14px;margin-top:8px;">📱 <strong>Mobile Money:</strong> <span style="color:#1a5c2e;font-weight:700;font-size:16px;">${churchMomo}</span></div>
      <div style="font-size:13px;margin-top:6px;">🏛 <strong>Bank Account:</strong> ${churchBank}</div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Amount Disbursed (GH₵)</label><input type="number" value="${disbursedAmount}" disabled style="background:#f5f5f5;"></div>
      <div class="form-group"><label>Actual Amount Spent (GH₵)</label><input type="number" id="rec-spent" placeholder="0.00" min="0" max="${disbursedAmount}" step="0.01" oninput="calcReturn(${disbursedAmount})"></div>
      <div class="form-group full"><label>Amount to Return (GH₵) — auto calculated</label><input type="number" id="rec-returned" readonly style="background:#f5f5f5;font-weight:700;color:#c0392b;"></div>
      <div class="form-group full"><label>Receipt Description / Reference</label><input type="text" id="rec-receipt" placeholder="Receipt number, vendor name, or description..."></div>
      <div class="form-group full"><label>Reconciliation Notes</label><textarea id="rec-notes" placeholder="Details of what was purchased/done..."></textarea></div>
    </div>
    <div id="rec-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('reconcile-req')">Cancel</button>
      <button class="btn btn-primary" onclick="submitReconciliation('${reqId}','${disbursedAmount}')">Submit Reconciliation</button>
    </div>
  `);
}

function calcReturn(disbursed) {
  const spent = parseFloat(document.getElementById('rec-spent')?.value||0);
  const returned = Math.max(0, disbursed - spent);
  const retEl = document.getElementById('rec-returned');
  if (retEl) retEl.value = returned.toFixed(2);
}

async function submitReconciliation(reqId, disbursedAmount) {
  const spent = parseFloat(document.getElementById('rec-spent').value||0);
  const returned = Math.max(0, disbursedAmount - spent);
  const receipt = document.getElementById('rec-receipt').value.trim();
  const notes = document.getElementById('rec-notes').value;
  if (spent <= 0) { document.getElementById('rec-msg').innerHTML = '<div class="alert alert-error">Please enter amount spent</div>'; return; }

  const { data: req } = await db.from('fund_requests').select('fund_source').eq('id',reqId).single();
  await db.from('fund_requests').update({
    status: 'reconciled', amount_spent: spent, amount_returned: returned,
    receipt_description: receipt, reconciliation_notes: notes,
    reconciled_at: new Date().toISOString(), reconciled_by: currentUser.id
  }).eq('id', reqId);

  // Return unspent funds to the source pot
  if (returned > 0 && req?.fund_source) {
    await incrementPot(req.fund_source, returned);
  }
  await logAudit('FUND_RECONCILED', 'fund_requests', reqId, { spent, returned, receipt });
  await loadGlobalData();
  closeModal('reconcile-req');
  loadRequests();
}

  if (!r) return;
  openModal('view-req', `

      <div class="calc-row"><span>Amount Requested</span><span class="font-bold">${fmt(r.amount_requested)}</span></div>

    ${r.description ? `<div style="margin:12px 0;"><strong>Description:</strong><p style="margin-top:6px;font-size:13px;color:var(--muted)">${r.description}</p></div>` : ''}
    ${(r.payment_method || r.payment_account_name || r.payment_account_number) ? `
    <div style="background:#fff8e1;border:1px solid #f9c74f;border-radius:8px;padding:14px;margin:12px 0;">
      <div style="font-size:12px;font-weight:700;color:#856404;margin-bottom:10px;">💳 PAYMENT DETAILS — Send funds to:</div>
      <div style="font-size:14px;"><strong>Method:</strong> ${(r.payment_method||'').replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase())}</div>
      <div style="font-size:14px;margin-top:6px;"><strong>Account Name:</strong> ${r.payment_account_name||'—'}</div>

let currentBudgetTab = 'pending';

async function loadBudgets() {
  let query = db.from('dept_budgets').select('*, submitted_by_user:users!dept_budgets_submitted_by_fkey(name,department)').order('year',{ascending:false}).order('quarter',{ascending:false});

  if (ALL_DEPT_ROLES.includes(currentUser.role)) {
    query = query.eq('department', currentUser.department||'');
  }
  const { data } = await query;
  const el = document.getElementById('budgets-table');
  if (!el) return;
  if (!data || !data.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>No budget submissions in this category</p></div>'; return; }
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Department</th><th>Quarter</th><th>Year</th><th>Amount</th><th>Submitted By</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
    <tbody>${data.map(b=>`<tr>
      <td><strong>${b.department}</strong></td>
      <td><span style="background:#e8f5e9;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:700;">${b.quarter}</span></td>
      <td>${b.year}</td>

      <td>${b.submitted_by_user?.name||'—'}</td>

      <td>${fmtDate(b.created_at)}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-sm btn-secondary" onclick="viewBudget('${b.id}')">View</button>

        <button class="btn btn-sm btn-primary" onclick="reviewBudget('${b.id}','approved')">✓ Approve</button>
        <button class="btn btn-sm btn-danger" onclick="reviewBudget('${b.id}','rejected')">✗ Reject</button>` : ''}

function reviewBudget(id, action) {

async function submitBudgetReview(id, action) {
  const notes = document.getElementById('rb-notes').value;
  const { data: b } = await db.from('dept_budgets').select('*, submitted_by_user:users!dept_budgets_submitted_by_fkey(id,name,email,department)').eq('id',id).single();
  await db.from('dept_budgets').update({ status: action, reviewed_by: currentUser.id, review_notes: notes, reviewed_at: new Date().toISOString() }).eq('id', id);
  if (b?.submitted_by_user) {
    const u = b.submitted_by_user;
    const msg = action === 'approved'
      ? `Your ${b.quarter} ${b.year} budget estimate of ${fmt(b.total_amount)} for ${b.department} has been APPROVED.`
      : `Your ${b.quarter} ${b.year} budget estimate for ${b.department} has been REJECTED. Reason: ${notes||'No reason given'}`;
    await notifyUser(u.id, `Budget ${action==='approved'?'Approved':'Rejected'}`, msg, 'budget', u.email, u.name);
  }
  closeModal('review-budget');
  loadBudgets();
}

async function saveEditBudget(id) {
  const year = document.getElementById('eb-year').value;
  const quarter = document.getElementById('eb-quarter').value;
  const amount = parseFloat(document.getElementById('eb-amount').value||0);
  const notes = document.getElementById('eb-notes').value;
  if (!year || amount <= 0) { document.getElementById('eb-msg').innerHTML = '<div class="alert alert-error">Year and amount required</div>'; return; }
  await db.from('dept_budgets').update({
    year: parseInt(year), quarter, total_amount: amount, notes,
    status: 'pending', reviewed_by: null, review_notes: null, reviewed_at: null
  }).eq('id', id);
  // Notify admins
  const { data: admins } = await db.from('users').select('id,name,email').in('role',['finance_admin','lead_pastor']).eq('is_active',true);
  for (const admin of admins||[]) {
    await notifyUser(admin.id,'Budget Resubmitted',`${currentUser.name} has edited and resubmitted a ${quarter} ${year} budget estimate for ${currentUser.department}.`,'budget', admin.email, admin.name);

}

async function generateMonthlyReport() {
  const month = document.getElementById('rep-month').value;
  if (!month) return;
  const [year, mon] = month.split('-').map(Number);
  const firstDay = month + '-01';
  const lastDay = new Date(year, mon, 0).toISOString().split('T')[0]; // last day of month
  const [{ data: income }, { data: requests }, { data: welfare }] = await Promise.all([
    db.from('income_records').select('*').gte('service_date',firstDay).lte('service_date',lastDay),
    db.from('fund_requests').select('*').gte('created_at',firstDay+'T00:00:00').lte('created_at',lastDay+'T23:59:59'),
    db.from('welfare_disbursements').select('*').gte('disbursement_date',firstDay).lte('disbursement_date',lastDay)
  ]);

  const totalIncome = (income||[]).reduce((s,r)=>s+parseFloat(r.total_amount||0),0);
  const totalTithe = (income||[]).reduce((s,r)=>s+parseFloat(r.tithe_amount||0),0);
  const totalSavings = (income||[]).reduce((s,r)=>s+parseFloat(r.savings_amount||0),0);
  const totalOp = (income||[]).reduce((s,r)=>s+parseFloat(r.operational_amount||0),0);
  const totalWelfareIn = (income||[]).reduce((s,r)=>s+parseFloat(r.welfare_amount||0),0);
  const totalWomens = (income||[]).reduce((s,r)=>s+parseFloat(r.womens_ministry_amount||0),0);
  const totalExp = (requests||[]).filter(r=>r.status==='reconciled').reduce((s,r)=>s+parseFloat(r.amount_spent||0),0);
  const totalWelfareOut = (welfare||[]).reduce((s,r)=>s+parseFloat(r.amount||0),0);

  const el = document.getElementById('report-output');
  el.style.display = 'block';
  el.innerHTML = `
    <div class="card-title">📊 Monthly Report — ${new Date(month+'-01').toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div>
        <h4 style="margin-bottom:12px;color:var(--green);">INCOME</h4>
        <div class="calc-row"><span>Total Offerings Received</span><span class="font-bold">${fmt(totalIncome)}</span></div>
        <div class="calc-row"><span>Tithe Deducted (10%)</span><span class="text-gold">${fmt(totalTithe)}</span></div>
        <div class="calc-row"><span>To Church Savings (60%)</span><span class="text-green">${fmt(totalSavings)}</span></div>
        <div class="calc-row"><span>To Operational Fund (40%)</span><span>${fmt(totalOp)}</span></div>
        <div class="calc-row"><span>Welfare Offerings</span><span class="text-red">${fmt(totalWelfareIn)}</span></div>
        <div class="calc-row"><span>Women's Ministry</span><span style="color:#7b1fa2">${fmt(totalWomens)}</span></div>
        <div class="calc-row"><span>Services Recorded</span><span>${(income||[]).length}</span></div>
      </div>
      <div>
        <h4 style="margin-bottom:12px;color:var(--red);">EXPENSES</h4>
        <div class="calc-row"><span>Total Disbursed (Reconciled)</span><span class="font-bold text-red">${fmt(totalExp)}</span></div>
        <div class="calc-row"><span>Welfare Disbursed</span><span class="text-red">${fmt(totalWelfareOut)}</span></div>
        <div class="calc-row"><span>Fund Requests This Month</span><span>${(requests||[]).length}</span></div>
        <div class="calc-row"><span>Pending Requests</span><span>${(requests||[]).filter(r=>r.status==='pending').length}</span></div>
        <hr class="divider">
        <div class="calc-row total"><span>Net (Income - Expenses)</span><span class="${totalIncome-totalExp>=0?'text-green':'text-red'}">${fmt(totalIncome-totalExp)}</span></div>
      </div>
    </div>
    <hr class="divider">
    <div style="font-size:12px;color:var(--muted);text-align:right;">Generated: ${new Date().toLocaleString('en-GB')} by ${currentUser.name}</div>
  `;
}

async function exportMonthlyCSV() {
  const month = document.getElementById('rep-month').value;
  if (!month) return;
  const [year, mon] = month.split('-').map(Number);
  const firstDay = month + '-01';
  const lastDay = new Date(year, mon, 0).toISOString().split('T')[0];
  const { data: income } = await db.from('income_records').select('*').gte('service_date', firstDay).lte('service_date', lastDay);
  if (!income || !income.length) { alert('No data for this month'); return; }
  const headers = ['Date','Service Type','Total','Tithe','Savings','Operational','Welfare','Womens Ministry','Notes'];
  const rows = income.map(r => [r.service_date, r.service_type, r.total_amount, r.tithe_amount, r.savings_amount, r.operational_amount, r.welfare_amount, r.womens_ministry_amount, r.notes||''].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  downloadCSV(csv, `MAN-Finance-${month}.csv`);
}

async function exportPledgeCSV() {
  const campaignId = document.getElementById('rep-campaign').value;
  let query = db.from('pledges').select('*, campaign:campaigns(name)');
  if (campaignId) query = query.eq('campaign_id', campaignId);
  const { data } = await query;
  if (!data || !data.length) { alert('No pledge data found'); return; }
  const headers = ['Name','Phone','Campaign','Pledged','Fulfilled','Outstanding','Status'];
  const rows = data.map(p => [p.pledger_name, p.phone||'', p.campaign?.name||'', p.pledged_amount, p.fulfilled_amount, parseFloat(p.pledged_amount)-parseFloat(p.fulfilled_amount), p.status].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  downloadCSV(csv, 'MAN-Pledges.csv');
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

      <button class="btn btn-primary" onclick="saveEditUser('${userId}')">Save Changes</button>
    </div>
  `);
}

async function saveEditUser(userId) {
  const name = document.getElementById('eu-name').value.trim();
  const email = document.getElementById('eu-email').value.trim();
  if (!name) { document.getElementById('eu-msg').innerHTML = '<div class="alert alert-error">Name is required</div>'; return; }
  const { error } = await db.from('users').update({ name, email: email||null }).eq('id', userId);
  if (error) { document.getElementById('eu-msg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  document.getElementById('eu-msg').innerHTML = '<div class="alert alert-success">✓ User updated successfully</div>';
  setTimeout(() => { closeModal('edit-user'); loadGlobalData().then(loadUsers); }, 1000);
}

function openChangePassword(userId, userName) {
  openModal('change-pw', `
    <button class="modal-close" onclick="closeModal('change-pw')">✕</button>
    <h3>🔑 Change Password — ${userName}</h3>
    <div class="form-group"><label>New Password</label><input type="password" id="cp-new" placeholder="Enter new password"></div>
    <div class="form-group mt-8"><label>Confirm Password</label><input type="password" id="cp-confirm" placeholder="Repeat new password"></div>
    <div id="cp-msg" class="mt-8"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('change-pw')">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewPassword('${userId}')">Save Password</button>
    </div>
  `);
}

async function saveNewPassword(userId) {
  const newPw = document.getElementById('cp-new').value;
  const confirmPw = document.getElementById('cp-confirm').value;
  if (!newPw || newPw.length < 6) { document.getElementById('cp-msg').innerHTML = '<div class="alert alert-error">Password must be at least 6 characters</div>'; return; }
  if (newPw !== confirmPw) { document.getElementById('cp-msg').innerHTML = '<div class="alert alert-error">Passwords do not match</div>'; return; }
  const { error } = await db.from('users').update({ password: newPw }).eq('id', userId);
  if (error) { document.getElementById('cp-msg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  document.getElementById('cp-msg').innerHTML = '<div class="alert alert-success">✓ Password updated successfully</div>';
  setTimeout(() => closeModal('change-pw'), 1500);
}

async function saveNewUser() {
  const name = document.getElementById('nu-name').value.trim();
  const username = document.getElementById('nu-username').value.trim();
  const password = document.getElementById('nu-password').value;
  const role = document.getElementById('nu-role').value;
  const dept = document.getElementById('nu-dept').value.trim();
  if (!name || !username || !password) { document.getElementById('nu-msg').innerHTML = '<div class="alert alert-error">Name, username and password required</div>'; return; }
  const { error } = await db.from('users').insert({ name, username, password, role, department: dept||null });
  if (error) { document.getElementById('nu-msg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  closeModal('new-user');
  await loadGlobalData();
  loadUsers();
}

async function toggleUserStatus(userId, isActive) {
  await db.from('users').update({ is_active: !isActive }).eq('id', userId);
  await loadGlobalData();
  loadUsers();
}
