<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAN Finance System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #b8860b;
    --gold-light: #f5e6c0;
    --gold-dark: #7a5c00;
    --green: #1a5c2e;
    --green-light: #e8f5ed;
    --green-mid: #2e7d4f;
    --red: #c0392b;
    --red-light: #fdecea;
    --blue: #1565c0;
    --blue-light: #e3f2fd;
    --gray: #f4f4f4;
    --border: #ddd;
    --text: #1a1a1a;
    --muted: #666;
    --white: #ffffff;
    --sidebar-w: 240px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: var(--text); font-size: 14px; }

  /* AUTH */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a2e1a 0%, #1a5c2e 60%, #b8860b 100%);
  }
  .auth-card {
    background: white; border-radius: 16px; padding: 40px 36px; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .auth-logo { text-align: center; margin-bottom: 28px; }
  .auth-logo .cross { font-size: 36px; color: var(--gold); }
  .auth-logo h1 { font-size: 20px; font-weight: 700; color: var(--green); margin-top: 6px; }
  .auth-logo p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .auth-card label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .auth-card input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border 0.2s; }
  .auth-card input:focus { border-color: var(--green); }
  .btn-login { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-login:hover { background: var(--green-mid); }
  .auth-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 10px; display: none; }

  /* LAYOUT */
  #app { display: none; min-height: 100vh; }
  .sidebar {
    position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
    background: #0a2e1a; color: white; overflow-y: auto; z-index: 100;
    display: flex; flex-direction: column;
  }
  .sidebar-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-header .church-name { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
  .sidebar-header .system-name { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .sidebar-user { padding: 14px 16px; background: rgba(255,255,255,0.05); margin: 8px 10px; border-radius: 8px; }
  .sidebar-user .u-name { font-size: 13px; font-weight: 600; color: white; }
  .sidebar-user .u-role { font-size: 11px; color: var(--gold-light); margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 8px 0; }
  .nav-section { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; padding: 12px 16px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.15s;
    font-size: 13px; border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
  .nav-item.active { background: rgba(184,134,11,0.2); color: var(--gold-light); border-left-color: var(--gold); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.1); }
  .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .btn-logout:hover { background: rgba(192,57,43,0.3); color: white; }

  /* MAIN CONTENT */
  .main { margin-left: var(--sidebar-w); padding: 24px; min-height: 100vh; }
  .page { display: none; }
  .page.active { display: block; }
  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-size: 22px; font-weight: 700; color: var(--green); }
  .page-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* CARDS */
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 20px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: white; border-radius: 12px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-top: 3px solid var(--green); }
  .stat-card.gold { border-top-color: var(--gold); }
  .stat-card.red { border-top-color: var(--red); }
  .stat-card.blue { border-top-color: var(--blue); }
  .stat-card.purple { border-top-color: #7b1fa2; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* FORMS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 13px; outline: none; transition: border 0.2s; background: white;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .calc-preview { background: var(--green-light); border: 1px solid #a8d5b5; border-radius: 8px; padding: 14px 16px; margin: 14px 0; }
  .calc-preview h4 { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .calc-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .calc-row.total { font-weight: 700; border-top: 1px solid #a8d5b5; margin-top: 6px; padding-top: 6px; color: var(--green); }
  .calc-row .amt { font-weight: 600; }

  /* BUTTONS */
  .btn { padding: 9px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: var(--green-mid); }
  .btn-secondary { background: var(--gray); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #a93226; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: var(--gold-dark); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

  /* TABLES */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f7f7f7; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 2px solid var(--border); }
  tbody td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tbody tr:hover { background: #fafafa; }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge-pending { background: #fff3cd; color: #856404; }
  .badge-approved { background: #d1e7dd; color: #0f5132; }
  .badge-rejected { background: #f8d7da; color: #842029; }
  .badge-disbursed { background: #cfe2ff; color: #084298; }
  .badge-reconciled { background: #e8f5e9; color: #1b5e20; }
  .badge-active { background: #d1e7dd; color: #0f5132; }
  .badge-completed { background: #e8f5e9; color: #1b5e20; }
  .badge-partial { background: #fff3cd; color: #856404; }
  .badge-fulfilled { background: #d1e7dd; color: #0f5132; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 14px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal-lg { max-width: 720px; }
  .modal h3 { font-size: 17px; font-weight: 700; color: var(--green); margin-bottom: 20px; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal-close:hover { color: var(--red); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* ALERTS */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .alert-success { background: #d1e7dd; color: #0f5132; border: 1px solid #a3cfbb; }
  .alert-error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
  .alert-info { background: #cfe2ff; color: #084298; border: 1px solid #9ec5fe; }
  .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffecb5; }

  /* TABS */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 9px 18px; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* PROGRESS BAR */
  .progress-bar { background: #e9ecef; border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 20px; transition: width 0.5s; }

  /* POT CARDS */
  .pots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .pot-card { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-left: 5px solid var(--green); }
  .pot-card.gold { border-left-color: var(--gold); }
  .pot-card.blue { border-left-color: var(--blue); }
  .pot-card.red { border-left-color: var(--red); }
  .pot-card.purple { border-left-color: #7b1fa2; }
  .pot-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; }
  .pot-balance { font-size: 24px; font-weight: 700; color: var(--text); }
  .pot-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* UTILITY */
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-gold { color: var(--gold); }
  .text-muted { color: var(--muted); }
  .font-bold { font-weight: 700; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .hidden { display: none !important; }
  .loading { text-align: center; padding: 30px; color: var(--muted); }

  @media (max-width: 768px) {
    .sidebar { width: 200px; }
    .main { margin-left: 200px; padding: 16px; }
    .form-grid, .form-grid.three { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="cross">✝</div>
      <h1>Mighty Army Network</h1>
      <p>Finance & Administration System</p>
    </div>
    <div>
      <label>Username</label>
      <input type="text" id="login-username" placeholder="Enter username" autocomplete="username">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-login" onclick="doLogin()">Sign In</button>
      <div class="auth-error" id="auth-error">Invalid username or password</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="church-name">✝ MIGHTY ARMY NETWORK</div>
      <div class="system-name">Finance & Admin System</div>
    </div>
    <div class="sidebar-user">
      <div class="u-name" id="sb-name">—</div>
      <div class="u-role" id="sb-role">—</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">⇠ Sign Out</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="main-content"></div>
</div>

<!-- MODALS CONTAINER -->
<div id="modals"></div>

<script>
// =============================================
// SUPABASE CONFIG — Replace with your credentials
// =============================================
const SUPABASE_URL = 'https://fixtjkfghcexffdxiisz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpeHRqa2ZnaGNleGZmZHhpaXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDM0MDksImV4cCI6MjA5NjAxOTQwOX0.-WrENj-GixEqeBKMg7q8_sgAsriJgJS46wHy9EaNSV0';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// =============================================
// APP STATE
// =============================================
let currentUser = null;
let appData = {
  pots: {},
  settings: {},
  users: []
};

// =============================================
// ROLE CONFIG
// =============================================
const ROLE_LABELS = {
  lead_pastor: 'Lead Pastor',
  finance_admin: 'Finance Admin',
  department_head: 'Department Head',
  womens_ministry_lead: "Women's Ministry Lead"
};

const NAV_CONFIG = [
  { section: 'Overview', items: [
    { id: 'dashboard', label: 'Dashboard', icon: '⊞', roles: ['lead_pastor','finance_admin','department_head','womens_ministry_lead'] }
  ]},
  { section: 'Finance', items: [
    { id: 'income', label: 'Record Income', icon: '↑', roles: ['finance_admin','lead_pastor'] },
    { id: 'pledges', label: 'Pledges & Campaigns', icon: '◎', roles: ['finance_admin','lead_pastor'] },
    { id: 'welfare', label: 'Welfare Fund', icon: '♥', roles: ['finance_admin','lead_pastor'] },
    { id: 'savings', label: 'Savings & Reserves', icon: '◈', roles: ['finance_admin','lead_pastor'] },
  ]},
  { section: 'Requests', items: [
    { id: 'requests', label: 'Fund Requests', icon: '⇌', roles: ['lead_pastor','finance_admin','department_head','womens_ministry_lead'] }
  ]},
  { section: 'Reports', items: [
    { id: 'reports', label: 'Reports & Export', icon: '▤', roles: ['lead_pastor','finance_admin'] },
    { id: 'audit', label: 'Audit Log', icon: '☰', roles: ['lead_pastor','finance_admin'] }
  ]},
  { section: 'Settings', items: [
    { id: 'users', label: 'Manage Users', icon: '⊕', roles: ['lead_pastor','finance_admin'] },
    { id: 'settings', label: 'System Settings', icon: '⚙', roles: ['lead_pastor','finance_admin'] }
  ]}
];

// =============================================
// AUTH
// =============================================
async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent = 'Please enter username and password'; errEl.style.display = 'block'; return; }
  try {
    const { data, error } = await db.from('users').select('*').eq('username', username).eq('password', password).eq('is_active', true).single();
    if (error || !data) { errEl.textContent = 'Invalid username or password'; errEl.style.display = 'block'; return; }
    currentUser = data;
    await initApp();
  } catch(e) { errEl.textContent = 'Connection error. Check Supabase settings.'; errEl.style.display = 'block'; }
}

function doLogout() {
  currentUser = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// =============================================
// INIT APP
// =============================================
async function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sb-name').textContent = currentUser.name;
  document.getElementById('sb-role').textContent = ROLE_LABELS[currentUser.role] || currentUser.role;
  await loadGlobalData();
  buildSidebar();
  buildPages();
  navigateTo('dashboard');
}

async function loadGlobalData() {
  const [{ data: pots }, { data: settings }, { data: users }] = await Promise.all([
    db.from('fund_pots').select('*'),
    db.from('settings').select('*'),
    db.from('users').select('id, name, username, role, department, is_active')
  ]);
  if (pots) pots.forEach(p => appData.pots[p.name] = p);
  if (settings) settings.forEach(s => appData.settings[s.key] = s.value);
  if (users) appData.users = users;
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  NAV_CONFIG.forEach(section => {
    const items = section.items.filter(i => i.roles.includes(currentUser.role));
    if (!items.length) return;
    nav.innerHTML += `<div class="nav-section">${section.section}</div>`;
    items.forEach(item => {
      nav.innerHTML += `<div class="nav-item" id="nav-${item.id}" onclick="navigateTo('${item.id}')"><span class="icon">${item.icon}</span>${item.label}</div>`;
    });
  });
}

function buildPages() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="page" id="page-dashboard">${pageDashboard()}</div>
    <div class="page" id="page-income">${pageIncome()}</div>
    <div class="page" id="page-pledges">${pagePledges()}</div>
    <div class="page" id="page-welfare">${pageWelfare()}</div>
    <div class="page" id="page-savings">${pageSavings()}</div>
    <div class="page" id="page-requests">${pageRequests()}</div>
    <div class="page" id="page-reports">${pageReports()}</div>
    <div class="page" id="page-audit">${pageAudit()}</div>
    <div class="page" id="page-users">${pageUsers()}</div>
    <div class="page" id="page-settings">${pageSettings()}</div>
  `;
}

function navigateTo(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const page = document.getElementById('page-' + pageId);
  const nav = document.getElementById('nav-' + pageId);
  if (page) { page.classList.add('active'); loadPage(pageId); }
  if (nav) nav.classList.add('active');
}

async function loadPage(pageId) {
  await loadGlobalData();
  switch(pageId) {
    case 'dashboard': loadDashboard(); break;
    case 'income': loadIncome(); break;
    case 'pledges': loadPledges(); break;
    case 'welfare': loadWelfare(); break;
    case 'savings': loadSavings(); break;
    case 'requests': loadRequests(); break;
    case 'reports': loadReports(); break;
    case 'audit': loadAudit(); break;
    case 'users': loadUsers(); break;
    case 'settings': loadSettings(); break;
  }
}

// =============================================
// FORMAT HELPERS
// =============================================
function fmt(n) { return 'GH₵ ' + parseFloat(n||0).toLocaleString('en-GH', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); }
function today() { return new Date().toISOString().split('T')[0]; }
function uid() { return Date.now().toString(36).toUpperCase(); }

async function logAudit(action, entityType, entityId, details) {
  await db.from('audit_log').insert({ action, entity_type: entityType, entity_id: entityId, performed_by: currentUser.id, details });
}

// =============================================
// DASHBOARD PAGE
// =============================================
function pageDashboard() {
  return `
    <div class="page-header">
      <h2>✝ Finance Dashboard</h2>
      <p>Overview of all church funds — <span id="dash-date"></span></p>
    </div>
    <div class="pots-grid" id="pots-grid"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="card">

        <div id="month-summary"></div>

function calcIncomeSplit() {
  const type = document.getElementById('inc-type')?.value;
  const general = parseFloat(document.getElementById('inc-general')?.value||0);
  const welfare = parseFloat(document.getElementById('inc-welfare')?.value||0);
  const womens = parseFloat(document.getElementById('inc-womens')?.value||0);
  const titheRate = parseFloat(appData.settings.tithe_rate||10)/100;
  const savingsRate = parseFloat(appData.settings.savings_rate||60)/100;
  const opRate = parseFloat(appData.settings.operational_rate||40)/100;

  // Show/hide womens field
  const wg = document.getElementById('inc-womens-group');
  if (wg) wg.style.display = (type === 'womens_ministry') ? 'flex' : 'none';

  const preview = document.getElementById('income-calc-preview');
  if (!preview) return;

  if (type === 'welfare') {
    preview.innerHTML = `<h4>📊 Allocation Preview</h4>
      <div class="calc-row"><span>Welfare Offering</span><span class="amt">${fmt(welfare)}</span></div>
      <div class="calc-row total"><span>→ Goes to Welfare Fund</span><span class="amt text-red">${fmt(welfare)}</span></div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;">⚠ No tithe is deducted from welfare offerings</div>`;
    return;
  }

  if (type === 'womens_ministry') {
    const tithe = womens * titheRate;
    const remaining = womens - tithe;
    const generalTithe = general * titheRate;
    const generalAfterTithe = general - generalTithe;
    const savings = generalAfterTithe * savingsRate;
    const operational = generalAfterTithe * opRate;
    preview.innerHTML = `<h4>📊 Allocation Preview</h4>
      <div class="calc-row"><span>General Offering</span><span class="amt">${fmt(general)}</span></div>
      <div class="calc-row"><span>├─ Tithe (${appData.settings.tithe_rate||10}%)</span><span class="amt text-gold">${fmt(generalTithe)}</span></div>
      <div class="calc-row"><span>├─ Church Savings (${appData.settings.savings_rate||60}% of remainder)</span><span class="amt text-green">${fmt(savings)}</span></div>
      <div class="calc-row"><span>└─ Operational (${appData.settings.operational_rate||40}% of remainder)</span><span class="amt">${fmt(operational)}</span></div>
      <hr class="divider">
      <div class="calc-row"><span>Women's Ministry Offering</span><span class="amt">${fmt(womens)}</span></div>
      <div class="calc-row"><span>├─ Tithe (${appData.settings.tithe_rate||10}%)</span><span class="amt text-gold">${fmt(tithe)}</span></div>
      <div class="calc-row"><span>└─ Women's Ministry Fund (ring-fenced)</span><span class="amt" style="color:#7b1fa2">${fmt(remaining)}</span></div>
      <div class="calc-row total"><span>Welfare</span><span class="amt text-red">${fmt(welfare)}</span></div>`;
    return;
  }

  const tithe = general * titheRate;
  const afterTithe = general - tithe;
  const savings = afterTithe * savingsRate;
  const operational = afterTithe * opRate;
  const total = general + welfare;

  preview.innerHTML = `<h4>📊 Automatic Allocation Preview</h4>
    <div class="calc-row"><span>Total Offering Received</span><span class="amt font-bold">${fmt(general)}</span></div>
    <div class="calc-row"><span>├─ Tithe Deducted (${appData.settings.tithe_rate||10}%)</span><span class="amt text-gold">${fmt(tithe)}</span></div>
    <div class="calc-row"><span>├─ Church Savings (${appData.settings.savings_rate||60}% of GH₵${afterTithe.toFixed(2)})</span><span class="amt text-green">${fmt(savings)}</span></div>
    <div class="calc-row"><span>└─ Operational Fund (${appData.settings.operational_rate||40}%)</span><span class="amt">${fmt(operational)}</span></div>
    ${welfare > 0 ? `<div class="calc-row"><span>Welfare Offering (separate fund)</span><span class="amt text-red">${fmt(welfare)}</span></div>` : ''}
    <div class="calc-row total"><span>Total Recorded</span><span>${fmt(total)}</span></div>`;
}

async function saveIncome() {
  const type = document.getElementById('inc-type').value;
  const date = document.getElementById('inc-date').value;
  const general = parseFloat(document.getElementById('inc-general')?.value||0);
  const welfare = parseFloat(document.getElementById('inc-welfare')?.value||0);
  const womens = parseFloat(document.getElementById('inc-womens')?.value||0);
  const notes = document.getElementById('inc-notes').value;
  const msg = document.getElementById('income-msg');

  if (!date) { msg.innerHTML = '<div class="alert alert-error">Please select a service date</div>'; return; }
  if (general <= 0 && welfare <= 0 && womens <= 0) { msg.innerHTML = '<div class="alert alert-error">Please enter at least one amount</div>'; return; }

  const titheRate = parseFloat(appData.settings.tithe_rate||10)/100;
  const savingsRate = parseFloat(appData.settings.savings_rate||60)/100;
  const opRate = parseFloat(appData.settings.operational_rate||40)/100;

  let tithe = 0, savings = 0, operational = 0, womens_amt = 0, welfare_amt = welfare;

  if (type === 'welfare') {
    welfare_amt = welfare;
  } else if (type === 'womens_ministry') {
    const wTithe = womens * titheRate;
    womens_amt = womens - wTithe;
    tithe = wTithe + (general * titheRate);
    const afterTithe = general - (general * titheRate);
    savings = afterTithe * savingsRate;
    operational = afterTithe * opRate;
  } else {
    tithe = general * titheRate;
    const afterTithe = general - tithe;
    savings = afterTithe * savingsRate;
    operational = afterTithe * opRate;
  }

  const total = (type === 'welfare') ? welfare : general + welfare + womens;

  try {
    const { data: rec, error } = await db.from('income_records').insert({
      service_date: date, service_type: type, total_amount: total,
      tithe_amount: tithe, savings_amount: savings, operational_amount: operational,
      womens_ministry_amount: womens_amt, welfare_amount: welfare_amt,
      notes, recorded_by: currentUser.id
    }).select().single();
    if (error) throw error;

    // Update pot balances
    const updates = [];
    if (tithe > 0) updates.push(db.from('fund_pots').update({ balance: db.raw ? null : undefined }).eq('name','tithe'));
    // Use RPC-style increment
    await Promise.all([
      tithe > 0 && incrementPot('tithe', tithe),
      savings > 0 && incrementPot('savings', savings),
      operational > 0 && incrementPot('operational', operational),
      womens_amt > 0 && incrementPot('womens_ministry', womens_amt),
      welfare_amt > 0 && incrementPot('welfare', welfare_amt),
    ].filter(Boolean));

    await logAudit('INCOME_RECORDED', 'income_records', rec.id, { total, type, date });
    msg.innerHTML = '<div class="alert alert-success">✓ Income recorded successfully and funds allocated to pots</div>';
    clearIncomeForm();
    await loadGlobalData();
    loadIncome();
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
  }
}

async function incrementPot(potName, amount) {
  const current = parseFloat(appData.pots[potName]?.balance || 0);
  await db.from('fund_pots').update({ balance: current + amount, updated_at: new Date().toISOString() }).eq('name', potName);
}

async function decrementPot(potName, amount) {
  const current = parseFloat(appData.pots[potName]?.balance || 0);
  const newBal = Math.max(0, current - amount);
  await db.from('fund_pots').update({ balance: newBal, updated_at: new Date().toISOString() }).eq('name', potName);
}

function switchTab(pageId, tabId) {
  const page = document.getElementById('page-' + pageId);
  page.querySelectorAll('.tab').forEach((t,i) => {
    const panels = page.querySelectorAll('.tab-panel');
    t.classList.toggle('active', t.textContent.toLowerCase().includes(tabId.replace('-',' ').toLowerCase()) || (i===0 && tabId==='campaigns') || (i===1 && tabId==='pledges-list'));
  });
  page.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('tab-'+pageId+'-'+tabId);
  if (panel) { panel.classList.add('active'); }
  if (tabId === 'campaigns') loadCampaigns();
  else loadAllPledges();

async function savePledgePayment(pledgeId, pledgedAmt, fulfilledAmt) {
  const amount = parseFloat(document.getElementById('pp-amount').value||0);

  await db.from('pledge_payments').insert({ pledge_id: pledgeId, amount, payment_date: date, notes, recorded_by: currentUser.id });

  closeModal('pledge-payment');
  loadCampaigns(); loadAllPledges();
}

function pageRequests() {
  return `

      <button class="tab active" onclick="switchReqTab('pending')">Pending</button>

      <button class="tab" onclick="switchReqTab('all')">All Requests</button>
    </div>
    <div id="requests-table"></div>
  `;
}

let currentReqTab = 'pending';
function switchReqTab(tab) {
  currentReqTab = tab;
  document.querySelectorAll('#page-requests .tab').forEach((t,i) => {
    t.classList.toggle('active', ['pending','approved','reconciled','all'][i] === tab);
  });
  loadRequests();
}

async function loadRequests() {
  // Show submit button for dept heads / womens lead
  const actEl = document.getElementById('req-actions');
  if (actEl && ['department_head','womens_ministry_lead','finance_admin','lead_pastor'].includes(currentUser.role)) {
    actEl.innerHTML = `<button class="btn btn-primary" onclick="openNewRequest()">+ New Fund Request</button>`;
  }

  let query = db.from('fund_requests').select('*, requested_by_user:users!fund_requests_requested_by_fkey(name,department), reviewed_by_user:users!fund_requests_reviewed_by_fkey(name)').order('created_at',{ascending:false});
  if (currentReqTab === 'pending') query = query.eq('status','pending');
  else if (currentReqTab === 'approved') query = query.in('status',['approved','disbursed']);
  else if (currentReqTab === 'reconciled') query = query.eq('status','reconciled');

  // Dept heads only see their own
  if (currentUser.role === 'department_head' || currentUser.role === 'womens_ministry_lead') {
    query = query.eq('requested_by', currentUser.id);
  }

  const { data } = await query.limit(50);
  const el = document.getElementById('requests-table');
  if (!data || !data.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No requests in this category</p></div>'; return; }

  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Ref</th><th>Dept</th><th>Amount</th><th>Fund</th><th>Purpose</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
    <tbody>${data.map(r => {
      const actions = getRequestActions(r);
      return `<tr>
        <td><strong>${r.request_number}</strong></td>
        <td>${r.department}</td>
        <td class="font-bold">${fmt(r.amount_requested)}</td>
        <td><span style="font-size:11px;background:#f0f0f0;padding:2px 8px;border-radius:10px;">${r.fund_source.replace('_',' ')}</span></td>
        <td>${r.purpose}</td>
        <td><span class="badge badge-${r.status}">${r.status}</span></td>
        <td>${fmtDate(r.created_at)}</td>
        <td style="white-space:nowrap;">${actions}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function getRequestActions(r) {
  const btns = [];
  btns.push(`<button class="btn btn-sm btn-secondary" onclick="viewRequest('${r.id}')">View</button>`);
  if (r.status === 'pending' && ['lead_pastor','finance_admin'].includes(currentUser.role)) {
    btns.push(`<button class="btn btn-sm btn-primary" onclick="reviewRequest('${r.id}','approve')">✓ Approve</button>`);
    btns.push(`<button class="btn btn-sm btn-danger" onclick="reviewRequest('${r.id}','reject')">✗ Reject</button>`);
  }
  if (r.status === 'approved' && ['lead_pastor','finance_admin'].includes(currentUser.role)) {
    btns.push(`<button class="btn btn-sm btn-gold" onclick="disburseRequest('${r.id}',${r.amount_requested},'${r.fund_source}')">💸 Disburse</button>`);
  }
  if (r.status === 'disbursed' && (r.requested_by === currentUser.id || ['lead_pastor','finance_admin'].includes(currentUser.role))) {
    btns.push(`<button class="btn btn-sm btn-primary" onclick="reconcileRequest('${r.id}',${r.amount_requested})">📋 Reconcile</button>`);
  }
  return btns.join(' ');
}

function openNewRequest() {
  const fundOptions = currentUser.role === 'womens_ministry_lead'
    ? `<option value="womens_ministry">Women's Ministry Fund</option>`
    : `<option value="operational">Operational Fund</option><option value="womens_ministry">Women's Ministry Fund</option>${['lead_pastor','finance_admin'].includes(currentUser.role)?'<option value="savings">Savings (exceptional only)</option>':''}`;

    <div class="form-grid">
      <div class="form-group"><label>Department</label><input type="text" id="rq-dept" value="${currentUser.department||''}" placeholder="Your department"></div>

  `);

async function saveRequest() {
  const dept = document.getElementById('rq-dept').value.trim();
  const fund = document.getElementById('rq-fund').value;
  const amount = parseFloat(document.getElementById('rq-amount').value||0);
  const purpose = document.getElementById('rq-purpose').value.trim();
  const desc = document.getElementById('rq-desc').value.trim();
  if (!dept || amount <= 0 || !purpose) { document.getElementById('rq-msg').innerHTML = '<div class="alert alert-error">Department, amount and purpose required</div>'; return; }
  const reqNum = 'REQ-' + new Date().getFullYear() + '-' + uid();
  const { error } = await db.from('fund_requests').insert({ request_number: reqNum, department: dept, requested_by: currentUser.id, fund_source: fund, amount_requested: amount, purpose, description: desc });
  if (error) { document.getElementById('rq-msg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }

function reviewRequest(reqId, action) {
  openModal('review-req', `
    <button class="modal-close" onclick="closeModal('review-req')">✕</button>
    <h3>${action === 'approve' ? '✓ Approve' : '✗ Reject'} Request</h3>
    <div class="form-group"><label>Notes / Reason</label><textarea id="rev-notes" placeholder="${action === 'reject' ? 'Reason for rejection...' : 'Optional approval notes...'}"></textarea></div>
    <div id="rev-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('review-req')">Cancel</button>
      <button class="btn ${action==='approve'?'btn-primary':'btn-danger'}" onclick="submitReview('${reqId}','${action}')">Confirm ${action==='approve'?'Approval':'Rejection'}</button>
    </div>
  `);
}

async function submitReview(reqId, action) {
  const notes = document.getElementById('rev-notes').value;
  const status = action === 'approve' ? 'approved' : 'rejected';
  const { error } = await db.from('fund_requests').update({ status, reviewed_by: currentUser.id, review_notes: notes, reviewed_at: new Date().toISOString() }).eq('id', reqId);
  if (error) { document.getElementById('rev-msg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  await logAudit('FUND_REQUEST_'+status.toUpperCase(), 'fund_requests', reqId, { notes });
  closeModal('review-req');
  loadRequests();
}

async function disburseRequest(reqId, amount, fundSource) {
  const balance = parseFloat(appData.pots[fundSource]?.balance||0);
  if (amount > balance) {
    openModal('disburse-err', `
      <button class="modal-close" onclick="closeModal('disburse-err')">✕</button>
      <h3>⚠ Insufficient Funds</h3>
      <div class="alert alert-error">The ${fundSource.replace('_',' ')} fund has ${fmt(balance)} but this request requires ${fmt(amount)}.</div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('disburse-err')">Close</button></div>
    `); return;
  }
  if (!confirm(`Disburse ${fmt(amount)} from ${fundSource.replace('_',' ')} fund?`)) return;
  await db.from('fund_requests').update({ status: 'disbursed', disbursed_at: new Date().toISOString(), disbursed_by: currentUser.id }).eq('id', reqId);
  await decrementPot(fundSource, amount);
  await logAudit('FUND_DISBURSED', 'fund_requests', reqId, { amount, fundSource });
  await loadGlobalData();
  loadRequests();
}

function reconcileRequest(reqId, disbursedAmount) {
  openModal('reconcile-req', `
    <button class="modal-close" onclick="closeModal('reconcile-req')">✕</button>
    <h3>📋 Reconcile Fund Request</h3>
    <div class="alert alert-info">Please provide the actual amount spent and return any unspent funds.</div>
    <div class="form-grid">
      <div class="form-group"><label>Amount Disbursed</label><input type="number" value="${disbursedAmount}" disabled style="background:#f5f5f5;"></div>
      <div class="form-group"><label>Actual Amount Spent (GH₵)</label><input type="number" id="rec-spent" placeholder="0.00" min="0" max="${disbursedAmount}" step="0.01" oninput="calcReturn(${disbursedAmount})"></div>
      <div class="form-group full"><label>Amount Returned (GH₵) — auto calculated</label><input type="number" id="rec-returned" readonly style="background:#f5f5f5;"></div>
      <div class="form-group full"><label>Receipt Description / Reference</label><input type="text" id="rec-receipt" placeholder="Receipt number, vendor name, or description..."></div>
      <div class="form-group full"><label>Reconciliation Notes</label><textarea id="rec-notes" placeholder="Details of what was purchased/done..."></textarea></div>
    </div>
    <div id="rec-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('reconcile-req')">Cancel</button>
      <button class="btn btn-primary" onclick="submitReconciliation('${reqId}','${disbursedAmount}')">Submit Reconciliation</button>
    </div>
  `);
}

function calcReturn(disbursed) {
  const spent = parseFloat(document.getElementById('rec-spent')?.value||0);
  const returned = Math.max(0, disbursed - spent);
  const retEl = document.getElementById('rec-returned');
  if (retEl) retEl.value = returned.toFixed(2);
}

async function submitReconciliation(reqId, disbursedAmount) {
  const spent = parseFloat(document.getElementById('rec-spent').value||0);
  const returned = Math.max(0, disbursedAmount - spent);
  const receipt = document.getElementById('rec-receipt').value.trim();
  const notes = document.getElementById('rec-notes').value;
  if (spent <= 0) { document.getElementById('rec-msg').innerHTML = '<div class="alert alert-error">Please enter amount spent</div>'; return; }

  const { data: req } = await db.from('fund_requests').select('fund_source').eq('id',reqId).single();
  await db.from('fund_requests').update({
    status: 'reconciled', amount_spent: spent, amount_returned: returned,
    receipt_description: receipt, reconciliation_notes: notes,
    reconciled_at: new Date().toISOString(), reconciled_by: currentUser.id
  }).eq('id', reqId);

  // Return unspent funds to the source pot
  if (returned > 0 && req?.fund_source) {
    await incrementPot(req.fund_source, returned);
  }
  await logAudit('FUND_RECONCILED', 'fund_requests', reqId, { spent, returned, receipt });
  await loadGlobalData();
  closeModal('reconcile-req');
  loadRequests();
}

    ${r.reviewed_by ? `<div style="margin:10px 0;padding:10px;background:#f5f5f5;border-radius:8px;font-size:13px;"><strong>Review:</strong> ${r.review_notes||'Approved'} <span class="text-muted">— ${r.reviewed_by_user?.name||''}</span></div>` : ''}

  `);
}

async function generateMonthlyReport() {
  const month = document.getElementById('rep-month').value;
  if (!month) return;
  const firstDay = month + '-01';
  const lastDay = month + '-31';
  const [{ data: income }, { data: requests }, { data: welfare }] = await Promise.all([
    db.from('income_records').select('*').gte('service_date',firstDay).lte('service_date',lastDay),
    db.from('fund_requests').select('*').gte('created_at',firstDay+'T00:00:00').lte('created_at',lastDay+'T23:59:59'),
    db.from('welfare_disbursements').select('*').gte('disbursement_date',firstDay).lte('disbursement_date',lastDay)
  ]);

  const totalIncome = (income||[]).reduce((s,r)=>s+parseFloat(r.total_amount||0),0);
  const totalTithe = (income||[]).reduce((s,r)=>s+parseFloat(r.tithe_amount||0),0);
  const totalSavings = (income||[]).reduce((s,r)=>s+parseFloat(r.savings_amount||0),0);
  const totalOp = (income||[]).reduce((s,r)=>s+parseFloat(r.operational_amount||0),0);
  const totalWelfareIn = (income||[]).reduce((s,r)=>s+parseFloat(r.welfare_amount||0),0);
  const totalWomens = (income||[]).reduce((s,r)=>s+parseFloat(r.womens_ministry_amount||0),0);
  const totalExp = (requests||[]).filter(r=>r.status==='reconciled').reduce((s,r)=>s+parseFloat(r.amount_spent||0),0);
  const totalWelfareOut = (welfare||[]).reduce((s,r)=>s+parseFloat(r.amount||0),0);

  const el = document.getElementById('report-output');
  el.style.display = 'block';
  el.innerHTML = `
    <div class="card-title">📊 Monthly Report — ${new Date(month+'-01').toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div>
        <h4 style="margin-bottom:12px;color:var(--green);">INCOME</h4>
        <div class="calc-row"><span>Total Offerings Received</span><span class="font-bold">${fmt(totalIncome)}</span></div>
        <div class="calc-row"><span>Tithe Deducted (10%)</span><span class="text-gold">${fmt(totalTithe)}</span></div>
        <div class="calc-row"><span>To Church Savings (60%)</span><span class="text-green">${fmt(totalSavings)}</span></div>
        <div class="calc-row"><span>To Operational Fund (40%)</span><span>${fmt(totalOp)}</span></div>
        <div class="calc-row"><span>Welfare Offerings</span><span class="text-red">${fmt(totalWelfareIn)}</span></div>
        <div class="calc-row"><span>Women's Ministry</span><span style="color:#7b1fa2">${fmt(totalWomens)}</span></div>
        <div class="calc-row"><span>Services Recorded</span><span>${(income||[]).length}</span></div>
      </div>
      <div>
        <h4 style="margin-bottom:12px;color:var(--red);">EXPENSES</h4>
        <div class="calc-row"><span>Total Disbursed (Reconciled)</span><span class="font-bold text-red">${fmt(totalExp)}</span></div>
        <div class="calc-row"><span>Welfare Disbursed</span><span class="text-red">${fmt(totalWelfareOut)}</span></div>
        <div class="calc-row"><span>Fund Requests This Month</span><span>${(requests||[]).length}</span></div>
        <div class="calc-row"><span>Pending Requests</span><span>${(requests||[]).filter(r=>r.status==='pending').length}</span></div>
        <hr class="divider">
        <div class="calc-row total"><span>Net (Income - Expenses)</span><span class="${totalIncome-totalExp>=0?'text-green':'text-red'}">${fmt(totalIncome-totalExp)}</span></div>
      </div>
    </div>
    <hr class="divider">
    <div style="font-size:12px;color:var(--muted);text-align:right;">Generated: ${new Date().toLocaleString('en-GB')} by ${currentUser.name}</div>
  `;
}

async function exportMonthlyCSV() {
  const month = document.getElementById('rep-month').value;
  if (!month) return;
  const { data: income } = await db.from('income_records').select('*').gte('service_date', month+'-01').lte('service_date', month+'-31');
  if (!income || !income.length) { alert('No data for this month'); return; }
  const headers = ['Date','Service Type','Total','Tithe','Savings','Operational','Welfare','Womens Ministry','Notes'];
  const rows = income.map(r => [r.service_date, r.service_type, r.total_amount, r.tithe_amount, r.savings_amount, r.operational_amount, r.welfare_amount, r.womens_ministry_amount, r.notes||''].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  downloadCSV(csv, `MAN-Finance-${month}.csv`);
}

async function exportPledgeCSV() {
  const campaignId = document.getElementById('rep-campaign').value;
  let query = db.from('pledges').select('*, campaign:campaigns(name)');
  if (campaignId) query = query.eq('campaign_id', campaignId);
  const { data } = await query;
  if (!data || !data.length) { alert('No pledge data found'); return; }
  const headers = ['Name','Phone','Campaign','Pledged','Fulfilled','Outstanding','Status'];
  const rows = data.map(p => [p.pledger_name, p.phone||'', p.campaign?.name||'', p.pledged_amount, p.fulfilled_amount, parseFloat(p.pledged_amount)-parseFloat(p.fulfilled_amount), p.status].join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  downloadCSV(csv, 'MAN-Pledges.csv');
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

async function saveNewUser() {
  const name = document.getElementById('nu-name').value.trim();
  const username = document.getElementById('nu-username').value.trim();
  const password = document.getElementById('nu-password').value;
  const role = document.getElementById('nu-role').value;
  const dept = document.getElementById('nu-dept').value.trim();
  if (!name || !username || !password) { document.getElementById('nu-msg').innerHTML = '<div class="alert alert-error">Name, username and password required</div>'; return; }
  const { error } = await db.from('users').insert({ name, username, password, role, department: dept||null });
  if (error) { document.getElementById('nu-msg').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  closeModal('new-user');
  await loadGlobalData();
  loadUsers();
}

async function toggleUserStatus(userId, isActive) {
  await db.from('users').update({ is_active: !isActive }).eq('id', userId);
  await loadGlobalData();
  loadUsers();
}

function pageSettings() {
  return `

    <div class="card">
      <div class="card-title">Financial Rates</div>
      <div class="form-grid">
        <div class="form-group"><label>Tithe Rate (%)</label><input type="number" id="s-tithe" placeholder="10" min="1" max="100"></div>
        <div class="form-group"><label>Savings Rate (% of post-tithe)</label><input type="number" id="s-savings" placeholder="60" min="1" max="100"></div>
        <div class="form-group"><label>Operational Rate (% of post-tithe)</label><input type="number" id="s-op" placeholder="40" min="1" max="100" readonly style="background:#f5f5f5;"></div>
        <div class="form-group"><label>Welfare Offering Frequency</label><select id="s-welfare">
          <option value="weekly">Weekly</option>
          <option value="biweekly">Every Two Weeks</option>
          <option value="monthly">Monthly</option>
        </select></div>
        <div class="form-group"><label>Church Name</label><input type="text" id="s-church" placeholder="Church name"></div>
      </div>
      <div class="alert alert-info mt-16">Note: Savings + Operational rates must add up to 100%. Changing rates only affects future recordings.</div>
      <div class="btn-group mt-16">
        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      </div>
      <div id="settings-msg" class="mt-8"></div>
    </div>
  `;
}

async function loadSettings() {
  const s = appData.settings;
  const setVal = (id, val) => { const el = document.getElementById(id); if(el && val) el.value = val; };
  setVal('s-tithe', s.tithe_rate);
  setVal('s-savings', s.savings_rate);
  setVal('s-op', s.operational_rate);
  setVal('s-welfare', s.welfare_frequency);
  setVal('s-church', s.church_name);
  document.getElementById('s-savings')?.addEventListener('input', function() {
    const op = document.getElementById('s-op');
    if(op) op.value = Math.max(0, 100 - parseFloat(this.value||0));
  });
}

async function saveSettings() {
  const tithe = document.getElementById('s-tithe').value;
  const savings = document.getElementById('s-savings').value;
  const op = 100 - parseFloat(savings||60);
  const welfare = document.getElementById('s-welfare').value;
  const church = document.getElementById('s-church').value.trim();
  const msg = document.getElementById('settings-msg');
  const updates = [
    { key:'tithe_rate', value: tithe },
    { key:'savings_rate', value: savings },
    { key:'operational_rate', value: op.toString() },
    { key:'welfare_frequency', value: welfare },
    { key:'church_name', value: church }
  ];
  for (const u of updates) {
    await db.from('settings').upsert({ key: u.key, value: u.value, updated_at: new Date().toISOString() });
  }
  await loadGlobalData();
  msg.innerHTML = '<div class="alert alert-success">✓ Settings saved</div>';
  loadSettings();
}
